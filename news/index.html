<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gas & Oil News</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="apple-touch-icon" href="../favicon.png" />

  <style>
    /* Same CSS-variable system as ../index.html so theme + colors stay in
       sync across pages. The light/dark choice itself is stored in
       localStorage under 'gp-theme', also shared with the map page. */
    :root {
      --bg-base:        #0a0e1a;
      --bg-panel:       #121826;
      --bg-panel-soft:  #1a2030;
      --border:         #1f2738;
      --border-strong:  #2a3349;
      --text-strong:    #e8ecf4;
      --text:           #b8bfd0;
      --text-muted:     #6b7488;
      --accent:         #5eead4;
      --accent-soft:    rgba(94, 234, 212, 0.10);
      --accent-border:  rgba(94, 234, 212, 0.55);
      --danger:         #fb7185;
    }

    [data-theme="light"] {
      --bg-base:        #f4f6fb;
      --bg-panel:       #ffffff;
      --bg-panel-soft:  #eef2f8;
      --border:         #e3e8f1;
      --border-strong:  #c9d2e0;
      --text-strong:    #111827;
      --text:           #3f4858;
      --text-muted:     #6b7488;
      --accent:         #0d9488;
      --accent-soft:    rgba(13, 148, 136, 0.08);
      --accent-border:  rgba(13, 148, 136, 0.45);
      --danger:         #e11d48;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: var(--bg-base);
      color: var(--text);
      min-height: 100vh;
    }

    /* ---------- HEADER (mirrors the map page) ---------------------------- */

    header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--bg-base);
      border-bottom: 1px solid var(--border);
      height: 84px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0 0.25rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-strong);
      white-space: nowrap;
    }
    .brand-logo {
      width: 64px;
      height: 64px;
      display: block;
      flex-shrink: 0;
      object-fit: contain;
    }
    .brand .accent { color: var(--accent); }

    .tabs { display: flex; gap: 0.4rem; align-items: center; }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 0.9rem;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab:hover { background: var(--bg-panel-soft); color: var(--text-strong); }
    .tab.active {
      color: var(--accent);
      border-color: var(--accent-border);
      background: var(--accent-soft);
    }
    .tab svg { width: 14px; height: 14px; }

    /* Country picker sits where the search bar sits on the map page —
       it's the primary "filter by place" control here too. Styled like a
       text input for visual parity. */
    .filter {
      position: relative;
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
    }
    #country-select {
      width: 100%;
      background: var(--bg-panel);
      color: var(--text-strong);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem 0.6rem 2.3rem;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    #country-select:focus { outline: none; border-color: var(--accent-border); }
    .filter-icon {
      position: absolute;
      left: 0.8rem;
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .filter-chev {
      position: absolute;
      right: 0.8rem;
      width: 12px;
      height: 12px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .header-controls { display: flex; align-items: center; gap: 0.4rem; }
    #theme-toggle {
      background: var(--bg-panel);
      color: var(--text-strong);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
    }
    #theme-toggle:hover { background: var(--bg-panel-soft); }
    #theme-toggle svg { width: 16px; height: 16px; }

    /* ---------- MAIN CONTENT --------------------------------------------- */

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.75rem 1.5rem 3rem;
    }

    .status {
      color: var(--text-muted);
      padding: 2rem 0;
      text-align: center;
      font-size: 0.95rem;
    }
    .status.error { color: var(--danger); }

    .news-section-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      margin: 1.75rem 0 0.85rem;
      font-weight: 600;
    }
    .news-section-title:first-of-type { margin-top: 0.5rem; }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .news-card {
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      color: var(--text-strong);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }
    .news-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
      border-color: var(--border-strong);
    }
    .news-card img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: var(--bg-panel-soft);
    }
    .news-card .body {
      padding: 0.85rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      flex: 1;
    }
    .news-card h3 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.35;
      color: var(--text-strong);
    }
    .news-card p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.45;
      /* Cap the description so cards stay similar heights. */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .news-card small {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: auto;
    }

    /* Highlighted cards (matching the selected country) get the cyan
       accent border + a soft tint, mirroring the map page's "Selected
       region" snapshot card. */
    .news-card.highlighted {
      border-color: var(--accent-border);
      background: linear-gradient(var(--accent-soft), var(--accent-soft)), var(--bg-panel);
    }
    .news-card.highlighted h3 { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img class="brand-logo" src="../logo.png" alt="" />
      <span>Gas <span class="accent">Prices</span></span>
    </div>
    <nav class="tabs">
      <a class="tab" href="../">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5.5 1 1 2.5v12.5L5.5 13l5 1.5L15 13V.5L10.5 2 5.5.5zm0 1.6 4.5 1.35V13.4L5.5 12.05V2.6zM4 2.6v9.45L2.4 12.6V3.1L4 2.6zm8.4 0L14 2.1v9.5l-1.6.5V2.6z"/></svg>
        Map
      </a>
      <a class="tab active" href="./" aria-current="page">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M4.5 6h7M4.5 8.5h7M4.5 11h4"/></svg>
        News
      </a>
    </nav>
    <div class="filter">
      <svg class="filter-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true"><circle cx="7" cy="7" r="5"/><path d="M14 14 11 11"/></svg>
      <select id="country-select" aria-label="Highlight news about a country">
        <option value="">Highlight a country or state…</option>
      </select>
      <svg class="filter-chev" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 4.5 6 8.5l4-4"/></svg>
    </div>
    <div class="header-controls">
      <button id="theme-toggle" type="button" aria-label="Toggle light/dark mode">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0a8 8 0 1 0 0 16A6 6 0 0 1 8 0z"/></svg>
      </button>
    </div>
  </header>

  <main>
    <div id="status" class="status">Loading news…</div>
    <div id="highlighted-section" hidden>
      <div class="news-section-title" id="highlighted-title">Mentions selected country</div>
      <div id="highlighted-grid" class="news-grid"></div>
    </div>
    <div id="other-section" hidden>
      <div class="news-section-title">Other headlines</div>
      <div id="other-grid" class="news-grid"></div>
    </div>
  </main>

  <script>
    // ----- CONFIG -------------------------------------------------------------

    // News is pre-baked into data/news.json by scripts/fetch_news.py, which
    // a GitHub Action runs every 6 hours. We used to call GNews directly
    // from the browser, but the free tier's 100-requests/day limit is
    // shared across all visitors and runs out fast — pre-baking makes the
    // browser hit a static file instead, the same way data/eu-prices.json
    // works for the map.
    const NEWS_URL = "../data/news.json";

    // Hardcoded country list for the highlight dropdown. Substring-matched
    // against article title + description, case-insensitive. The list is
    // deliberately a single primary name per country — adding aliases
    // ("U.S.", "America", "UAE") is a future polish but creates word-boundary
    // headaches ("US" matching "USA" or "RUSsia") that aren't worth solving
    // until the basic flow proves itself.
    const COUNTRIES = [
      "Argentina", "Australia", "Austria", "Belgium", "Brazil", "Canada",
      "Chile", "China", "Colombia", "Croatia", "Czechia", "Denmark", "Egypt",
      "Finland", "France", "Germany", "Greece", "Hungary", "India", "Indonesia",
      "Iran", "Iraq", "Ireland", "Israel", "Italy", "Japan", "Kuwait", "Mexico",
      "Netherlands", "New Zealand", "Nigeria", "Norway", "Pakistan",
      "Philippines", "Poland", "Portugal", "Qatar", "Romania", "Russia",
      "Saudi Arabia", "Singapore", "South Africa", "South Korea", "Spain",
      "Sweden", "Switzerland", "Thailand", "Turkey",
      "United Arab Emirates", "United Kingdom", "United States", "Venezuela",
      "Vietnam",
    ];

    // ----- THEME (shared with index.html via localStorage 'gp-theme') --------

    function applyTheme(theme) {
      document.body.dataset.theme = theme;
      localStorage.setItem("gp-theme", theme);
      // Toggle is icon-only now — no text label to update.
    }
    applyTheme(localStorage.getItem("gp-theme") || "dark");
    document.getElementById("theme-toggle").addEventListener("click", () => {
      applyTheme(document.body.dataset.theme === "light" ? "dark" : "light");
    });

    // ----- COUNTRY DROPDOWN --------------------------------------------------

    const countrySelect = document.getElementById("country-select");
    for (const c of COUNTRIES) {
      const opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    }

    // The map page deep-links here via news/?country=NAME. If that param
    // is present and matches an option, pre-select it. If it's present but
    // not in the dropdown (e.g. a US state name like "Texas"), add it as a
    // one-off option so the highlight still works.
    const params = new URLSearchParams(location.search);
    const initialCountry = params.get("country");
    if (initialCountry) {
      if (!COUNTRIES.includes(initialCountry)) {
        const opt = document.createElement("option");
        opt.value = initialCountry;
        opt.textContent = initialCountry;
        countrySelect.insertBefore(opt, countrySelect.options[1]);
      }
      countrySelect.value = initialCountry;
    }

    countrySelect.addEventListener("change", () => {
      // Update the URL so the highlight is shareable/bookmarkable, but
      // don't push history entries — back-button shouldn't cycle through
      // every dropdown change.
      const url = new URL(location.href);
      if (countrySelect.value) url.searchParams.set("country", countrySelect.value);
      else url.searchParams.delete("country");
      history.replaceState(null, "", url);
      render();
    });

    // ----- FETCH NEWS --------------------------------------------------------

    const status = document.getElementById("status");
    const highlightedSection = document.getElementById("highlighted-section");
    const highlightedGrid = document.getElementById("highlighted-grid");
    const highlightedTitle = document.getElementById("highlighted-title");
    const otherSection = document.getElementById("other-section");
    const otherGrid = document.getElementById("other-grid");

    let articles = [];

    async function loadNews() {
      try {
        const res = await fetch(NEWS_URL, { cache: "no-cache" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        articles = json.articles || [];
        if (!articles.length) {
          status.textContent = "No articles found.";
          return;
        }
        status.hidden = true;
        render();
      } catch (err) {
        console.error(err);
        status.textContent = "Failed to load news: " + err.message;
        status.classList.add("error");
      }
    }

    // ----- RENDER ------------------------------------------------------------

    // Minimal HTML escape so external titles/descriptions can't inject markup.
    function esc(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function articleMatchesCountry(article, country) {
      if (!country) return false;
      const haystack = ((article.title || "") + " " + (article.description || "")).toLowerCase();
      return haystack.includes(country.toLowerCase());
    }

    function cardHTML(article, highlighted) {
      const date = new Date(article.publishedAt).toLocaleDateString(undefined, {
        year: "numeric", month: "short", day: "numeric",
      });
      const source = article.source?.name || "Unknown source";
      const img = article.image
        ? `<img src="${esc(article.image)}" loading="lazy" alt="">`
        : "";
      return `
        <a class="news-card${highlighted ? ' highlighted' : ''}"
           href="${esc(article.url)}" target="_blank" rel="noopener">
          ${img}
          <div class="body">
            <h3>${esc(article.title)}</h3>
            <p>${esc(article.description || "")}</p>
            <small>${esc(source)} · ${esc(date)}</small>
          </div>
        </a>
      `;
    }

    function render() {
      const country = countrySelect.value;
      if (!country) {
        highlightedSection.hidden = true;
        otherSection.hidden = false;
        otherGrid.innerHTML = articles.map((a) => cardHTML(a, false)).join("");
        return;
      }
      const matches = [];
      const rest = [];
      for (const a of articles) {
        (articleMatchesCountry(a, country) ? matches : rest).push(a);
      }
      if (matches.length) {
        highlightedTitle.textContent = `Mentions ${country}`;
        highlightedGrid.innerHTML = matches.map((a) => cardHTML(a, true)).join("");
        highlightedSection.hidden = false;
      } else {
        highlightedTitle.textContent = `No recent articles mention ${country}`;
        highlightedGrid.innerHTML = "";
        highlightedSection.hidden = false;
      }
      otherSection.hidden = !rest.length;
      otherGrid.innerHTML = rest.map((a) => cardHTML(a, false)).join("");
    }

    loadNews();
  </script>
</body>
</html>
