name: Refresh US prices

# EIA releases weekly retail gasoline prices Monday afternoon (Eastern).
# Tuesday morning UTC is comfortably after the drop. workflow_dispatch
# adds a manual "Run workflow" button in the Actions tab.
on:
  schedule:
    - cron: "0 10 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # fetch_us_prices.py uses stdlib only — no pip install needed.

      - run: python3 scripts/fetch_us_prices.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/us-prices.json; then
            echo "No changes."
          else
            git add data/us-prices.json
            git commit -m "chore: refresh US state prices"
            git push
          fi
