name: Refresh world prices

# GlobalPetrolPrices refreshes weekly. The exact day isn't published, so
# Saturday morning UTC is a safe arbitrary choice.
on:
  schedule:
    - cron: "0 10 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # fetch_world_prices.py uses stdlib only — no pip install needed.

      - run: python3 scripts/fetch_world_prices.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/world-prices.json; then
            echo "No changes."
          else
            git add data/world-prices.json
            git commit -m "chore: refresh world prices"
            git push
          fi
