name: Refresh news

# Runs every 6 hours so the page never feels stale by more than that.
# 4 calls/day uses ~4% of GNews's free 100/day quota, leaving plenty of
# headroom for manual runs via the "Run workflow" button.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # fetch_news.py uses stdlib only — no pip install needed.

      - run: python3 scripts/fetch_news.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/news.json; then
            echo "No changes."
          else
            git add data/news.json
            git commit -m "chore: refresh news"
            git push
          fi
