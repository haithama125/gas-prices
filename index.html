<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gas Prices</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />

  <!-- Leaflet: a free map library. Loaded from a CDN so we don't need to install anything. -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Chart.js (v4) for the sparkline charts in the Global Snapshot sidebar.
       The "umd" build is the standalone version we can use from a CDN. -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>

  <style>
    /* CSS custom properties (a.k.a. variables) — declared once on :root, then
       referenced below as var(--name). Swapping the [data-theme="light"] block
       changes every value at once, which is how the light/dark toggle works. */
    :root {
      --bg-base:        #0a0e1a;   /* deepest navy — the page + map underlay */
      --bg-panel:       #121826;   /* cards, dropdowns, popups */
      --bg-panel-soft:  #1a2030;   /* hover state for buttons/menu items */
      --border:         #1f2738;
      --border-strong:  #2a3349;
      --text-strong:    #e8ecf4;   /* big numbers, primary text */
      --text:           #b8bfd0;
      --text-muted:     #6b7488;
      --accent:         #5eead4;   /* teal — used for active tab + cheap price */
      --accent-soft:    rgba(94, 234, 212, 0.10);
      --accent-border:  rgba(94, 234, 212, 0.55);
      --danger:         #fb7185;   /* coral — used for expensive price */
      /* Per-layer fallback fills for polygons with no price data. Heatmap
         colours override these once paintHeatmap() runs. */
      --eu-stroke:      #fbbf24;
      --eu-fill:        #f59e0b;
      --world-stroke:   #34d399;
      --world-fill:     #10b981;
    }

    [data-theme="light"] {
      --bg-base:        #f4f6fb;
      --bg-panel:       #ffffff;
      --bg-panel-soft:  #eef2f8;
      --border:         #e3e8f1;
      --border-strong:  #c9d2e0;
      --text-strong:    #111827;
      --text:           #3f4858;
      --text-muted:     #6b7488;
      --accent:         #0d9488;
      --accent-soft:    rgba(13, 148, 136, 0.08);
      --accent-border:  rgba(13, 148, 136, 0.45);
      --danger:         #e11d48;
      --eu-stroke:      #b45309;
      --eu-fill:        #f59e0b;
      --world-stroke:   #047857;
      --world-fill:     #10b981;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: var(--bg-base);
      color: var(--text);
    }

    /* ---------- HEADER --------------------------------------------------- */

    header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--bg-base);
      border-bottom: 1px solid var(--border);
      height: 84px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0 0.25rem 0 0.25rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-strong);
      white-space: nowrap;
    }
    .brand .accent { color: var(--accent); }
    .brand-logo {
      width: 64px;
      height: 64px;
      display: block;
      flex-shrink: 0;
      object-fit: contain;
    }

    .tabs { display: flex; gap: 0.4rem; align-items: center; }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 0.9rem;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab:hover { background: var(--bg-panel-soft); color: var(--text-strong); }
    .tab.active {
      color: var(--accent);
      border-color: var(--accent-border);
      background: var(--accent-soft);
    }
    .tab svg { width: 14px; height: 14px; }

    /* Search bar takes the available middle space. position:relative is so
       the absolutely-positioned results dropdown hangs off the input. */
    .search {
      position: relative;
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
    }
    #search-input {
      width: 100%;
      background: var(--bg-panel);
      color: var(--text-strong);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem 0.6rem 2.3rem;
      font: inherit;
      font-size: 0.9rem;
    }
    #search-input:focus {
      outline: none;
      border-color: var(--accent-border);
    }
    #search-input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute;
      left: 0.8rem;
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* Results dropdown. z-index has to beat Leaflet — its controls/panes
       sit around 400-700, so anything in the 1000s wins. */
    #search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      margin: 0;
      padding: 4px 0;
      list-style: none;
      background: var(--bg-panel);
      color: var(--text-strong);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 280px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
    }
    #search-results[hidden] { display: none; }
    #search-results li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0.85rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    /* `.active` is for keyboard nav (arrow keys); :hover is for mouse.
       Both paint the same so the highlight feels consistent across inputs. */
    #search-results li.active,
    #search-results li:hover { background: var(--bg-panel-soft); }
    .search-result-tag {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-left: 0.75rem;
      white-space: nowrap;
    }
    .search-empty {
      padding: 0.45rem 0.85rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-style: italic;
    }

    .header-controls { display: flex; align-items: center; gap: 0.4rem; }
    #currency-select,
    #theme-toggle {
      background: var(--bg-panel);
      color: var(--text-strong);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.8rem;
      font: inherit;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #currency-select:hover,
    #theme-toggle:hover { background: var(--bg-panel-soft); }
    #theme-toggle {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    #theme-toggle svg { width: 16px; height: 16px; }

    /* ---------- LAYOUT (map + sidebar) ---------------------------------- */

    .layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      height: calc(100vh - 84px);
    }
    #map {
      height: 100%;
      width: 100%;
      background: var(--bg-base);  /* covers any briefly-blank canvas */
    }

    /* ---------- GLOBAL SNAPSHOT SIDEBAR --------------------------------- */

    .snapshot {
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      overflow-y: auto;
    }
    .snapshot h2 {
      margin: 0;
      padding: 1.25rem 1.25rem 0.85rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--text-muted);
    }
    .snap-card {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .snap-label {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .snap-price {
      font-size: 2rem;
      font-weight: 600;
      color: var(--text-strong);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }
    .snap-price .unit {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 0.1rem;
    }
    .snap-price.accent { color: var(--accent); }
    .snap-price.danger { color: var(--danger); }
    .snap-source {
      font-size: 0.85rem;
      color: var(--text);
    }
    .snap-source .meta { color: var(--text-muted); }
    .snap-selected {
      background: var(--accent-soft);
      border-top: 1px solid var(--accent-border);
      box-shadow: inset 3px 0 0 var(--accent);
      padding-left: calc(1.25rem - 3px);
    }

    /* Sparkline container. Chart.js needs a wrapper with a fixed height so
       it knows what size to render the <canvas> at. We reserve the top
       28px with padding so a tooltip can float in that dead space without
       covering the chart line below. */
    .snap-chart {
      position: relative;
      height: 92px;
      margin-top: 0.5rem;
      padding-top: 30px;
    }
    .snap-chart canvas { display: block; }
    .snap-chart[hidden] { display: none; }

    /* External Chart.js tooltip — an HTML node we move in JS so the popup
       lives in the reserved space ABOVE the chart, never over the line. */
    .snap-chart-tooltip {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      background: rgba(10, 14, 26, 0.95);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.72rem;
      white-space: nowrap;
      color: var(--text-strong);
      opacity: 0;
      transition: opacity 0.12s ease;
      transform: translateX(-50%);
      z-index: 5;
    }
    .snap-chart-tooltip .ct-date  { color: var(--text-muted); margin-right: 6px; }
    .snap-chart-tooltip .ct-price { color: var(--accent); font-weight: 600; }

    /* ---------- LEAFLET POPUP / LEGEND / ATTRIBUTION ------------------- */

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: var(--bg-panel);
      color: var(--text-strong);
    }
    .leaflet-popup-content-wrapper {
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .leaflet-popup-content { font-size: 0.9rem; line-height: 1.4; }
    .leaflet-popup-content small { color: var(--text-muted); }
    .leaflet-popup-close-button { color: var(--text-muted) !important; }

    .popup-news-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.8rem;
    }
    .popup-news-link:hover { text-decoration: underline; }

    /* Attribution — required by OSM + CARTO licenses, but visually toned
       down. Hover bumps opacity so it's readable when you actually look. */
    .leaflet-control-attribution {
      background: transparent !important;
      color: var(--text-muted);
      font-size: 9px;
      padding: 0 4px;
      opacity: 0.35;
      transition: opacity 0.2s ease;
    }
    .leaflet-control-attribution:hover { opacity: 1; }
    .leaflet-control-attribution a { color: inherit; text-decoration: none; }
    .leaflet-control-attribution a:hover { text-decoration: underline; }

    .city-pin {
      /* Indigo — distinct from the green/yellow/red heatmap signal so the
         pins read as UI markers, not price data. Pops on both themes. */
      color: #818cf8;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.55));
    }
    .city-pin svg { display: block; }

    /* Heatmap legend — a small Leaflet control pinned to bottom-left. */
    .legend {
      background: var(--bg-panel);
      color: var(--text-strong);
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.8rem;
      line-height: 1.3;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      min-width: 220px;
    }
    .legend-title {
      font-size: 0.78rem;
      color: var(--text);
      margin-bottom: 6px;
    }
    .legend-bar {
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(
        to right,
        hsl(120, 70%, 45%),
        hsl(60, 70%, 45%),
        hsl(0, 70%, 45%)
      );
      margin: 6px 0;
    }
    .legend-labels {
      display: flex;
      justify-content: space-between;
      color: var(--text-muted);
      font-size: 0.72rem;
    }

    /* ---------- MOBILE LAYOUT (≤ 720px) --------------------------------
       At narrow widths the side-by-side map+sidebar grid squeezes both.
       We stack them vertically and wrap the header so the search bar gets
       its own row. The map keeps a fixed viewport-height share so it never
       collapses to a strip. */
    @media (max-width: 720px) {
      header {
        flex-wrap: wrap;
        height: auto;
        padding: 0.55rem 0.75rem;
        gap: 0.45rem;
      }
      .brand-logo { width: 40px; height: 40px; }
      .brand { font-size: 1.05rem; gap: 0.5rem; padding: 0; }
      .tab { padding: 0.4rem 0.55rem; font-size: 0.82rem; }
      .tab svg { width: 13px; height: 13px; }
      /* order:10 pushes the search to the end of the flex row, where it
         wraps to a second line with flex-basis:100% taking the full width. */
      .search { order: 10; flex: 1 1 100%; }
      #search-input { padding: 0.5rem 0.85rem 0.5rem 2rem; }
      #currency-select { padding: 0.45rem 0.5rem; font-size: 0.8rem; }
      #theme-toggle { width: 38px; height: 38px; }

      /* Stack map over sidebar. display:block lets the page scroll
         naturally on mobile instead of pinning everything to viewport. */
      .layout {
        display: block;
        height: auto;
      }
      #map { height: 55vh; }
      .snapshot {
        border-left: none;
        border-top: 1px solid var(--border);
        overflow: visible;
      }
      .snap-price { font-size: 1.55rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img class="brand-logo" src="logo.png" alt="" />
      <span>Gas <span class="accent">Prices</span></span>
    </div>
    <nav class="tabs">
      <a class="tab active" href="./" aria-current="page">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5.5 1 1 2.5v12.5L5.5 13l5 1.5L15 13V.5L10.5 2 5.5.5zm0 1.6 4.5 1.35V13.4L5.5 12.05V2.6zM4 2.6v9.45L2.4 12.6V3.1L4 2.6zm8.4 0L14 2.1v9.5l-1.6.5V2.6z"/></svg>
        Map
      </a>
      <a class="tab" href="news/">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M4.5 6h7M4.5 8.5h7M4.5 11h4"/></svg>
        News
      </a>
    </nav>
    <div class="search">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true"><circle cx="7" cy="7" r="5"/><path d="M14 14 11 11"/></svg>
      <input
        id="search-input"
        type="search"
        placeholder="Search country or state…"
        autocomplete="off"
        aria-label="Search states or countries"
        aria-autocomplete="list"
        aria-controls="search-results"
      />
      <ul id="search-results" role="listbox" hidden></ul>
    </div>
    <div class="header-controls">
      <!-- Currency dropdown. The selected currency dictates BOTH the symbol
           AND the unit shown in popups (USD → /gallon, others → /litre),
           because that's how people in each market read pump prices. -->
      <select id="currency-select" aria-label="Display currency">
        <option value="USD">USD / gallon</option>
        <option value="EUR">EUR / litre</option>
        <option value="GBP">GBP / litre</option>
        <option value="CAD">CAD / litre</option>
      </select>
      <button id="theme-toggle" type="button" aria-label="Toggle light/dark mode">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0a8 8 0 1 0 0 16A6 6 0 0 1 8 0z"/></svg>
      </button>
    </div>
  </header>

  <main class="layout">
    <div id="map"></div>
    <aside class="snapshot">
      <h2>GLOBAL SNAPSHOT</h2>
      <div class="snap-card">
        <div class="snap-label">World cheapest</div>
        <div class="snap-price accent" id="snap-cheapest-price">—</div>
        <div class="snap-source" id="snap-cheapest-place">Loading…</div>
      </div>
      <div class="snap-card">
        <div class="snap-label">World most expensive</div>
        <div class="snap-price danger" id="snap-expensive-price">—</div>
        <div class="snap-source" id="snap-expensive-place">Loading…</div>
      </div>
      <div class="snap-card">
        <div class="snap-label">Global avg</div>
        <div class="snap-price" id="snap-global-price">—</div>
        <div class="snap-source" id="snap-global-source"><span class="meta">Loading…</span></div>
      </div>
      <div class="snap-card">
        <div class="snap-label">US national avg</div>
        <div class="snap-price" id="snap-us-price">—</div>
        <div class="snap-source" id="snap-us-source"><span class="meta">EIA · this week</span></div>
        <div class="snap-chart" id="snap-us-chart-wrap" hidden>
          <div class="snap-chart-tooltip"></div>
          <canvas id="snap-us-chart"></canvas>
        </div>
      </div>
      <div class="snap-card">
        <div class="snap-label">EU avg</div>
        <div class="snap-price" id="snap-eu-price">—</div>
        <div class="snap-source" id="snap-eu-source"><span class="meta">Oil Bulletin</span></div>
      </div>
      <div class="snap-card snap-selected">
        <div class="snap-label">Selected region</div>
        <div class="snap-price accent" id="snap-selected-price">—</div>
        <div class="snap-source" id="snap-selected-source">Click a region on the map</div>
        <div class="snap-chart" id="snap-selected-chart-wrap" hidden>
          <div class="snap-chart-tooltip"></div>
          <canvas id="snap-selected-chart"></canvas>
        </div>
      </div>
    </aside>
  </main>

  <script>
    // ----- CONFIG -------------------------------------------------------------

    // EIA API key — register for free at https://www.eia.gov/opendata/register.php
    // (Takes ~30 seconds. They email you the key.) Paste it in the quotes below.
    const EIA_API_KEY = "xcUs1Wmv2tgVjJBIRvMJYd6NCYvo5JTdVkJPHSjE";

    // ----- CURRENCY -----------------------------------------------------------
    //
    // We display every price in the user's selected currency. Each data source
    // gives us prices in one "native" currency + unit (USD/gallon for EIA,
    // EUR/litre for the EU bulletin), and `formatPrice` does the conversion.
    //
    // FX rates are hardcoded snapshots — refresh them by hand occasionally
    // (rates from https://www.frankfurter.app, a free ECB-backed feed; the
    // numbers below were last set on 2026-05-18). For a personal project these
    // are accurate enough; if it ever matters, fetch live rates on page load.

    const FX_TO_USD = { USD: 1.00, EUR: 1.08, GBP: 1.27, CAD: 0.73 };

    // Each currency has a "home" unit — what people in that market expect to
    // see on a pump sign. USD is per-gallon (US convention), everyone else
    // is per-litre.
    const UNIT_FOR_CURRENCY = { USD: "gallon", EUR: "litre", GBP: "litre", CAD: "litre" };
    const CURRENCY_SYMBOL   = { USD: "$",      EUR: "€",     GBP: "£",     CAD: "C$" };
    const LITRES_PER_GALLON = 3.78541;

    function getCurrency() {
      return localStorage.getItem("gp-currency") || "USD";
    }

    // ----- POPUP PRICE RENDERING ---------------------------------------------
    //
    // Currency can change after a popup is already open. Rather than scraping
    // numbers out of popup HTML, each price popup registers a render function
    // here when it opens. On currency change we re-run all of them.
    //
    // Cleanup: when the popup closes, the `once("remove", ...)` hook removes
    // its entry so the Map doesn't grow over time.
    const popupRenderers = new Map(); // popup instance -> render fn

    function registerPriceRender(popup, renderFn) {
      // Set (not add) so re-clicking the same marker overwrites cleanly.
      popupRenderers.set(popup, renderFn);
      renderFn();
      popup.once("remove", () => popupRenderers.delete(popup));
    }

    function rerenderAllPricePopups() {
      popupRenderers.forEach((fn) => fn());
    }

    // Convert `value` (in `nativeCurrency` per `nativeUnit`) into the user's
    // currently-selected currency + its home unit, then return a formatted
    // string like "$3.27/gallon" or "€1.829/litre".
    //
    // Pipeline:
    //   value [native cur / native unit]
    //     -> USD per native unit    (multiply by FX_TO_USD[nativeCurrency])
    //     -> target cur per native unit (divide by FX_TO_USD[target])
    //     -> target cur per target unit (litre↔gallon conversion if needed)
    function formatPrice(value, nativeCurrency, nativeUnit) {
      const target = getCurrency();
      const usdPerNativeUnit = value * FX_TO_USD[nativeCurrency];
      let out = usdPerNativeUnit / FX_TO_USD[target];
      const targetUnit = UNIT_FOR_CURRENCY[target];
      if (nativeUnit !== targetUnit) {
        out = nativeUnit === "gallon"
          ? out / LITRES_PER_GALLON   // $/gal -> $/L
          : out * LITRES_PER_GALLON;  // $/L  -> $/gal
      }
      // Gallons are bigger, so the per-gallon number is bigger and 2 decimal
      // places looks right ($3.27). Per-litre prices are smaller and people
      // are used to seeing 3 decimals (€1.829).
      const dp = targetUnit === "gallon" ? 2 : 3;
      return `${CURRENCY_SYMBOL[target]}${out.toFixed(dp)}/${targetUnit}`;
    }

    // ----- DATA LOOKUPS -------------------------------------------------------

    // The state-shapes GeoJSON we load below labels states by full name
    // (e.g. "California"). EIA uses 2-letter codes, so we need this bridge.
    const STATE_NAME_TO_CODE = {
      "Alabama": "AL", "Alaska": "AK", "Arizona": "AZ", "Arkansas": "AR",
      "California": "CA", "Colorado": "CO", "Connecticut": "CT", "Delaware": "DE",
      "District of Columbia": "DC", "Florida": "FL", "Georgia": "GA", "Hawaii": "HI",
      "Idaho": "ID", "Illinois": "IL", "Indiana": "IN", "Iowa": "IA",
      "Kansas": "KS", "Kentucky": "KY", "Louisiana": "LA", "Maine": "ME",
      "Maryland": "MD", "Massachusetts": "MA", "Michigan": "MI", "Minnesota": "MN",
      "Mississippi": "MS", "Missouri": "MO", "Montana": "MT", "Nebraska": "NE",
      "Nevada": "NV", "New Hampshire": "NH", "New Jersey": "NJ", "New Mexico": "NM",
      "New York": "NY", "North Carolina": "NC", "North Dakota": "ND", "Ohio": "OH",
      "Oklahoma": "OK", "Oregon": "OR", "Pennsylvania": "PA", "Rhode Island": "RI",
      "South Carolina": "SC", "South Dakota": "SD", "Tennessee": "TN", "Texas": "TX",
      "Utah": "UT", "Vermont": "VT", "Virginia": "VA", "Washington": "WA",
      "West Virginia": "WV", "Wisconsin": "WI", "Wyoming": "WY",
    };

    // EIA only publishes individual state-level weekly retail prices for these
    // ~9 states. The codes (e.g. "SCA") are EIA's "duoarea" identifiers.
    const STATE_EIA_CODES = {
      CA: "SCA", CO: "SCO", FL: "SFL", MA: "SMA", MN: "SMN",
      NY: "SNY", OH: "SOH", TX: "STX", WA: "SWA",
    };

    // PADDs = "Petroleum Administration for Defense Districts" — EIA's 5
    // regional groupings of the US. Every state belongs to exactly one.
    // For states without their own EIA series, we fall back to the PADD avg.
    const STATE_TO_PADD = {
      // PADD 1 — East Coast
      CT: "R10", DE: "R10", DC: "R10", FL: "R10", GA: "R10", ME: "R10",
      MD: "R10", MA: "R10", NH: "R10", NJ: "R10", NY: "R10", NC: "R10",
      PA: "R10", RI: "R10", SC: "R10", VT: "R10", VA: "R10", WV: "R10",
      // PADD 2 — Midwest
      IL: "R20", IN: "R20", IA: "R20", KS: "R20", KY: "R20", MI: "R20",
      MN: "R20", MO: "R20", NE: "R20", ND: "R20", OH: "R20", OK: "R20",
      SD: "R20", TN: "R20", WI: "R20",
      // PADD 3 — Gulf Coast
      AL: "R30", AR: "R30", LA: "R30", MS: "R30", NM: "R30", TX: "R30",
      // PADD 4 — Rocky Mountain
      CO: "R40", ID: "R40", MT: "R40", UT: "R40", WY: "R40",
      // PADD 5 — West Coast
      AK: "R50", AZ: "R50", CA: "R50", HI: "R50", NV: "R50", OR: "R50", WA: "R50",
    };

    const PADD_NAMES = {
      R10: "East Coast (PADD 1)",
      R20: "Midwest (PADD 2)",
      R30: "Gulf Coast (PADD 3)",
      R40: "Rocky Mountain (PADD 4)",
      R50: "West Coast (PADD 5)",
    };

    // Major metros EIA publishes separate weekly retail prices for.
    // The lat/lng is where the pin sits on the map.
    const CITY_PINS = [
      { name: "Boston",        code: "Y05BO", lat: 42.3601, lng:  -71.0589 },
      { name: "Chicago",       code: "Y35CH", lat: 41.8781, lng:  -87.6298 },
      { name: "Cleveland",     code: "Y05CL", lat: 41.4993, lng:  -81.6944 },
      { name: "Denver",        code: "Y45DV", lat: 39.7392, lng: -104.9903 },
      { name: "Houston",       code: "Y44HO", lat: 29.7604, lng:  -95.3698 },
      { name: "Los Angeles",   code: "Y05LA", lat: 34.0522, lng: -118.2437 },
      { name: "Miami",         code: "Y05MI", lat: 25.7617, lng:  -80.1918 },
      { name: "New York City", code: "Y35NY", lat: 40.7128, lng:  -74.0060 },
      { name: "San Francisco", code: "Y05SF", lat: 37.7749, lng: -122.4194 },
      { name: "Seattle",       code: "Y48SE", lat: 47.6062, lng: -122.3321 },
    ];

    // ----- MAP SETUP ----------------------------------------------------------

    // Create a Leaflet map inside the <div id="map">.
    // setView takes [latitude, longitude] and a zoom level (4 ≈ whole US).
    //
    // maxBounds + maxBoundsViscosity:1.0 pen the user to a single copy of
    // the world so dragging east or west hits a hard wall instead of
    // sliding off into empty space. worldCopyJump:false stops Leaflet from
    // wrapping marker positions across the antimeridian. The ±85° latitude
    // clamp is because Web Mercator can't render closer to the poles.
    const WORLD_BOUNDS = [[-85, -180], [85, 180]];
    const map = L.map("map", {
      maxBounds: WORLD_BOUNDS,
      maxBoundsViscosity: 1.0,
      worldCopyJump: false,
    }).setView([39.8283, -98.5795], 4);

    // Floor on zoom-out: pick the smallest zoom at which the world bounds
    // still fully cover the viewport. Below that, you'd see blank gray
    // strips above/below (or beside) the map. `getBoundsZoom(bounds, true)`
    // returns the zoom where the viewport fits *inside* the bounds — which
    // is exactly what we want. Recompute on resize so widening the window
    // bumps the floor up if needed.
    function updateMinZoom() {
      map.setMinZoom(map.getBoundsZoom(WORLD_BOUNDS, true));
    }
    updateMinZoom();
    window.addEventListener("resize", () => {
      updateMinZoom();
      // Leaflet caches the container size; invalidateSize() makes it
      // re-measure so the map redraws correctly when the layout shifts
      // (window resize, mobile orientation flip, etc.).
      map.invalidateSize();
    });

    // Drop the "Leaflet" prefix from the attribution control. OSM + CARTO
    // credits stay (they're license-required); only the library's self-
    // credit is optional, and Leaflet's docs explicitly allow removing it.
    map.attributionControl.setPrefix(false);

    // Two CARTO tile themes — "_nolabels" variants because the mockup is a
    // dark canvas with no city/country labels competing with the colored
    // polygons. Free, no API key, attribution required. {s}/{z}/{x}/{y}
    // are placeholders Leaflet fills in.
    const TILE_URLS = {
      dark:  "https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",
      light: "https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",
    };
    const TILE_OPTS = {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: "abcd",
      maxZoom: 19,
      // noWrap stops the tile layer from painting extra world copies past
      // ±180° longitude. maxBounds alone doesn't fix this — Leaflet still
      // renders adjacent tiles at low zooms unless we explicitly opt out.
      noWrap: true,
    };

    // We hold onto the active tile layer and the state-polygon layer so the
    // theme toggle below can swap/restyle them without re-creating the map.
    let tileLayer = null;
    let statesLayer = null;
    let euCountriesLayer = null;
    let worldCountriesLayer = null;

    // Polygon styling. Priced polygons get the heat color for BOTH stroke
    // and fill (the stroke runs at full opacity so the borders pop while
    // the fill stays at REST_OPACITY) — see paintLayer() below. Unpriced
    // polygons get a unified muted blue-gray so they read as "clickable
    // but no data" without competing with the heat colors next to them.
    const POLYGON_FALLBACK_FILL   = "#2d3447";
    const POLYGON_FALLBACK_STROKE = "#3d4660";
    const POLYGON_REST_OPACITY    = 0.7;
    const POLYGON_HOVER_OPACITY   = 0.9;
    const POLYGON_STROKE_WEIGHT   = 1.2;

    function polygonFallbackStyle() {
      return {
        color: POLYGON_FALLBACK_STROKE,
        weight: 1,
        opacity: 0.7,
        fillColor: POLYGON_FALLBACK_FILL,
        fillOpacity: 0.4,
      };
    }

    // Kept as thin wrappers for clarity at the call sites — every layer
    // shares the same fallback now (we removed the per-continent palette).
    function stateStyleFor() { return polygonFallbackStyle(); }
    function euStyleFor()    { return polygonFallbackStyle(); }

    // Read the current theme from the <body data-theme="..."> attribute.
    // Defaults to "dark" before applyTheme has run.
    function currentTheme() {
      return document.body.dataset.theme || "dark";
    }

    // Apply a theme: update the body attribute (so CSS variables flip),
    // swap the map tile layer, restyle the state polygons, update the toggle
    // button label, and remember the choice for next visit.
    function applyTheme(theme) {
      document.body.dataset.theme = theme;
      localStorage.setItem("gp-theme", theme);

      // The toggle is icon-only — no label to update. The icon itself stays
      // constant (a half-filled circle) since the cue is "press to flip".

      if (tileLayer) map.removeLayer(tileLayer);
      tileLayer = L.tileLayer(TILE_URLS[theme], TILE_OPTS).addTo(map);

      if (statesLayer) statesLayer.setStyle(stateStyleFor());
      // EU + world styles are read from CSS vars, which have already
      // updated above, so we just re-apply them.
      if (euCountriesLayer) euCountriesLayer.setStyle(euStyleFor());
      if (worldCountriesLayer) worldCountriesLayer.setStyle(worldStyleFor());

      // The setStyle calls above wipe heatmap fillColors. Repaint so the
      // heatmap survives a theme flip.
      paintHeatmap();
    }

    // Initial theme — a `theme` in the URL hash (deep link) wins, then
    // saved preference, then dark as a final default. applyTheme persists
    // to localStorage either way, so a shared link's theme also sticks.
    applyTheme(parseHash().theme || localStorage.getItem("gp-theme") || "dark");

    document.getElementById("theme-toggle").addEventListener("click", () => {
      const next = currentTheme() === "light" ? "dark" : "light";
      applyTheme(next);
      updateHash({ theme: next });
    });

    // Currency dropdown: restore the saved choice on load, then save changes.
    // We don't try to retroactively rewrite open popups — the next click will
    // render in the new currency, which is good enough and avoids tracking
    // every popup's original native price.
    const currencySelect = document.getElementById("currency-select");
    // A `cur` in the URL hash (deep link) wins over localStorage on load —
    // and we persist it so the link's currency sticks for the next visit.
    const hashCur = parseHash().cur;
    if (hashCur && FX_TO_USD[hashCur]) {
      localStorage.setItem("gp-currency", hashCur);
    }
    currencySelect.value = getCurrency();
    currencySelect.addEventListener("change", (e) => {
      localStorage.setItem("gp-currency", e.target.value);
      updateHash({ cur: e.target.value });
      rerenderAllPricePopups();
      refreshLegend();
      renderSnapshot();
    });

    // ----- DEEP LINKING (URL hash) -------------------------------------------
    //
    // The map URL can carry the user's view: #region=US-CA&cur=EUR&theme=light
    // opens directly to that region in that currency. Share-friendly links
    // for "Belgium right now" without any backend.
    //
    // - region keys: "US-XX" for states, ISO2 for EU + world countries.
    //   Polygon click handlers register themselves in regionByKey as their
    //   layer loads, and a pending deep-link is applied as soon as its key
    //   shows up there.
    // - currency / theme: applied at load time (above for currency, below
    //   for theme), and re-written on every user change so the URL always
    //   reflects the current view. history.replaceState keeps the back
    //   button clean — every interaction would otherwise add a history
    //   entry the user has to click back through.

    const regionByKey = new Map(); // 'US-CA' | 'BE' -> Leaflet layer

    // function declaration (not arrow) so it hoists — the currency setup
    // block above calls parseHash() before reaching this section.
    function parseHash() {
      const h = location.hash.startsWith("#") ? location.hash.slice(1) : location.hash;
      const p = new URLSearchParams(h);
      return {
        region: p.get("region") || null,
        cur:    p.get("cur")    || null,
        theme:  p.get("theme")  || null,
      };
    }

    function updateHash(partial) {
      const next = { ...parseHash(), ...partial };
      const p = new URLSearchParams();
      for (const [k, v] of Object.entries(next)) {
        if (v) p.set(k, v); // null/empty removes the key entirely
      }
      const str = p.toString();
      const url = str ? "#" + str : location.pathname + location.search;
      history.replaceState(null, "", url);
    }

    // Pending until the matching layer loads. Set once at startup from the
    // URL; cleared by tryApplyDeepLink() after the click is fired.
    let pendingDeepLinkRegion = parseHash().region;

    function tryApplyDeepLink() {
      if (!pendingDeepLinkRegion) return;
      const layer = regionByKey.get(pendingDeepLinkRegion);
      if (!layer) return; // its layer hasn't loaded yet — try again later
      // Reuse the existing flyTo + click path so we get the same popup +
      // sidebar selection behavior as a manual click.
      map.flyToBounds(layer.getBounds(), { padding: [40, 40], maxZoom: 6 });
      layer.fire("click");
      pendingDeepLinkRegion = null;
    }

    // ----- EIA FETCH ----------------------------------------------------------

    // Ask EIA for the most recent weekly retail price (regular gasoline = "EPMR")
    // for the given duoarea (region) code. Returns { value, period } or null.
    //
    // async/await note: fetch() returns a Promise (a future value). `await` pauses
    // this function until the Promise resolves, so we can write network code that
    // *reads* top-to-bottom instead of nesting callbacks.
    async function fetchPrice(duoareaCode) {
      const url = "https://api.eia.gov/v2/petroleum/pri/gnd/data/"
        + "?frequency=weekly"
        + "&data[0]=value"
        + `&facets[duoarea][]=${duoareaCode}`
        + "&facets[product][]=EPMR"
        + "&sort[0][column]=period"
        + "&sort[0][direction]=desc"
        + "&offset=0&length=1"
        + `&api_key=${EIA_API_KEY}`;
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        const json = await res.json();
        const row = json?.response?.data?.[0];
        if (!row) return null;
        return { value: parseFloat(row.value), period: row.period };
      } catch (err) {
        console.error("EIA fetch failed for", duoareaCode, err);
        return null;
      }
    }

    // Shared "key not set yet" message so the page still feels alive before
    // the user pastes their EIA key in.
    const KEY_MISSING_MSG = "Add your EIA API key at the top of index.html to load prices.";
    const keyIsSet = () => EIA_API_KEY && EIA_API_KEY !== "PASTE_YOUR_KEY_HERE";

    // ----- SEARCH (states + countries) ---------------------------------------
    //
    // As each GeoJSON layer loads, its onEachFeature callback pushes an entry
    // here. Each entry holds a direct reference to the polygon's Leaflet
    // layer, so selecting a result can:
    //   1. flyToBounds() on the polygon to bring it into view, and
    //   2. fire('click') on the same layer to reuse the existing price-
    //      fetch + popup code paths — no duplicate fetch logic here.
    //
    // The index is appended to from three async callbacks (US states, EU
    // countries, world countries). JS is single-threaded so the pushes are
    // safe; new entries just become searchable as soon as their layer loads.
    //
    // The `source` field powers the small "US state / EU / World" chip in
    // each result. It matters because some names collide — "Georgia" is
    // both a US state and a country, and the chip is how the user picks.

    const searchIndex = []; // { name, source: 'US' | 'EU' | 'World', layer }

    const SOURCE_LABEL = { US: "US state", EU: "EU", World: "World" };

    const searchInput   = document.getElementById("search-input");
    const searchResults = document.getElementById("search-results");
    let currentResults = []; // entries currently shown in the dropdown
    let activeIndex = -1;    // for arrow-key navigation

    function renderResults(results) {
      currentResults = results;
      activeIndex = results.length ? 0 : -1;
      if (!results.length) {
        searchResults.innerHTML = '<li class="search-empty">No matches</li>';
        searchResults.hidden = false;
        return;
      }
      // Build the dropdown items. The data-index attribute is what the
      // click handler reads to know which result was clicked.
      searchResults.innerHTML = results.map((r, i) => `
        <li role="option" data-index="${i}"${i === activeIndex ? ' class="active"' : ''}>
          <span>${r.name}</span>
          <span class="search-result-tag">${SOURCE_LABEL[r.source]}</span>
        </li>
      `).join("");
      searchResults.hidden = false;
    }

    function hideResults() {
      searchResults.hidden = true;
      activeIndex = -1;
    }

    // Two-tier ranking: prefix matches first, then substring matches.
    // Within each tier we keep insertion order (US first, then EU, then
    // world) which feels reasonable as a tiebreaker. Cap at 8 visible.
    function runSearch(query) {
      const q = query.trim().toLowerCase();
      if (!q) { hideResults(); return; }
      const prefix = [], contains = [];
      for (const entry of searchIndex) {
        const name = entry.name.toLowerCase();
        if (name.startsWith(q))      prefix.push(entry);
        else if (name.includes(q))   contains.push(entry);
      }
      renderResults([...prefix, ...contains].slice(0, 8));
    }

    function selectResult(entry) {
      hideResults();
      searchInput.value = entry.name;
      // maxZoom caps how far we zoom in for tiny countries (Luxembourg
      // shouldn't blow up to street level). padding leaves room for the
      // popup that opens next.
      map.flyToBounds(entry.layer.getBounds(), { padding: [40, 40], maxZoom: 6 });
      // Fire the existing click handler — that's what opens the popup and
      // runs the right fetch (EIA / EU / world). No duplication.
      entry.layer.fire("click");
    }

    function updateActive() {
      searchResults.querySelectorAll("li").forEach((li, i) => {
        li.classList.toggle("active", i === activeIndex);
        if (i === activeIndex) li.scrollIntoView({ block: "nearest" });
      });
    }

    searchInput.addEventListener("input", (e) => runSearch(e.target.value));
    // Re-show prior results when the user clicks back into the field.
    searchInput.addEventListener("focus", (e) => {
      if (e.target.value.trim()) runSearch(e.target.value);
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "ArrowDown") {
        e.preventDefault();
        if (!currentResults.length) return;
        activeIndex = (activeIndex + 1) % currentResults.length;
        updateActive();
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        if (!currentResults.length) return;
        activeIndex = (activeIndex - 1 + currentResults.length) % currentResults.length;
        updateActive();
      } else if (e.key === "Enter") {
        e.preventDefault();
        if (activeIndex >= 0 && currentResults[activeIndex]) {
          selectResult(currentResults[activeIndex]);
        }
      } else if (e.key === "Escape") {
        hideResults();
        searchInput.blur();
      }
    });

    searchResults.addEventListener("click", (e) => {
      const li = e.target.closest("li[data-index]");
      if (!li) return;
      const idx = parseInt(li.dataset.index, 10);
      if (!isNaN(idx) && currentResults[idx]) selectResult(currentResults[idx]);
    });

    // Click anywhere outside the search closes the dropdown.
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".search")) hideResults();
    });

    // ----- US STATE PRICES (pre-baked) ----------------------------------------
    //
    // data/us-prices.json is refreshed weekly by scripts/fetch_us_prices.py
    // (run from the GitHub Action). One entry per state with USD/gallon +
    // its source (state-level series vs PADD fallback). The heatmap needs
    // all 51 prices on screen at once — too many to hit EIA live from the
    // browser, hence the pre-bake. Per-state click popups still call EIA
    // directly because we already had that working.

    const usPricesPromise = fetch("data/us-prices.json")
      .then((r) => r.json())
      .catch((err) => {
        console.error("US prices load failed", err);
        return null;
      });

    // ----- STATE SHAPES -------------------------------------------------------

    // GeoJSON = states as polygons. We load a public file via the jsDelivr CDN
    // (mirrors GitHub with proper CORS headers, unlike raw.githubusercontent.com).
    fetch("https://cdn.jsdelivr.net/gh/PublicaMundi/MappingAPI@master/data/geojson/us-states.json")
      .then((r) => r.json())
      .then((data) => {
        statesLayer = L.geoJSON(data, {
          style: stateStyleFor(),
          onEachFeature: (feature, layer) => {
            const stateName = feature.properties.name;
            const stateCode = STATE_NAME_TO_CODE[stateName];
            searchIndex.push({ name: stateName, source: "US", layer });
            // Register so a #region=US-CA deep link can find this layer.
            if (stateCode) regionByKey.set("US-" + stateCode, layer);

            // Subtle hover: brighten the blue fill while the cursor's over the state.
            layer.on("mouseover", () => layer.setStyle({ fillOpacity: POLYGON_HOVER_OPACITY }));
            layer.on("mouseout",  () => layer.setStyle({ fillOpacity: POLYGON_REST_OPACITY }));

            layer.on("click", async () => {
              const stateName = feature.properties.name;
              const stateCode = STATE_NAME_TO_CODE[stateName];
              if (stateCode) updateHash({ region: "US-" + stateCode });

              // If EIA publishes the state directly, use that. Otherwise fall
              // back to the state's PADD regional average.
              const stateSeries = STATE_EIA_CODES[stateCode];
              const eiaCode = stateSeries || STATE_TO_PADD[stateCode];
              const isFallback = !stateSeries;

              const popup = L.popup()
                .setLatLng(layer.getBounds().getCenter())
                .setContent(`<strong>${stateName}</strong><br>Loading…`)
                .openOn(map);

              if (!keyIsSet()) {
                popup.setContent(`<strong>${stateName}</strong><br>${KEY_MISSING_MSG}`);
                return;
              }
              if (!eiaCode) {
                popup.setContent(`<strong>${stateName}</strong><br>No EIA region mapped.`);
                return;
              }

              const price = await fetchPrice(eiaCode);
              if (!price) {
                popup.setContent(`<strong>${stateName}</strong><br>No data available.`);
                return;
              }

              const sourceLabel = isFallback
                ? `${PADD_NAMES[eiaCode]} regional average`
                : "State average";
              setSelected(stateName, price.value, "USD", "gallon", sourceLabel, eiaCode);
              registerPriceRender(popup, () => {
                popup.setContent(
                  `<strong>${stateName}</strong><br>` +
                  `${formatPrice(price.value, "USD", "gallon")}<br>` +
                  `<small>${sourceLabel} · Week of ${price.period}</small><br>` +
                  `<a class="popup-news-link" href="news/?country=${encodeURIComponent(stateName)}">News →</a>`
                );
              });
            });
          },
        }).addTo(map);
        // Paint this layer with heatmap colors as soon as its polygons exist.
        paintHeatmap();
        tryApplyDeepLink();
      })
      .catch((err) => console.error("Failed to load state shapes", err));

    // ----- CITY PINS ----------------------------------------------------------

    // Teal SVG pin so city markers match the site's accent color
    // instead of Leaflet's default blue PNG.
    const cityPinIcon = L.divIcon({
      className: "city-pin",
      html:
        '<svg xmlns="http://www.w3.org/2000/svg" width="26" height="38" viewBox="0 0 26 38">' +
          '<path fill="currentColor" stroke="rgba(0,0,0,0.35)" stroke-width="1" ' +
            'd="M13 1C6.4 1 1 6.3 1 12.8c0 9.1 12 24.2 12 24.2s12-15.1 12-24.2C25 6.3 19.6 1 13 1z"/>' +
          '<circle cx="13" cy="13" r="4.5" fill="rgba(255,255,255,0.95)"/>' +
        '</svg>',
      iconSize: [26, 38],
      iconAnchor: [13, 37],
      popupAnchor: [0, -32],
    });

    CITY_PINS.forEach((city) => {
      const marker = L.marker([city.lat, city.lng], { icon: cityPinIcon }).addTo(map);
      // Initial popup text — Leaflet shows this immediately on click, then our
      // handler swaps in the real price once the fetch resolves.
      marker.bindPopup(`<strong>${city.name}</strong><br>Loading…`);

      marker.on("click", async () => {
        // City pins aren't deep-linkable on their own, so drop any prior
        // region from the URL — otherwise a #region=BE would linger after
        // the user moves on to clicking pins.
        updateHash({ region: null });
        if (!keyIsSet()) {
          marker.setPopupContent(`<strong>${city.name}</strong><br>${KEY_MISSING_MSG}`);
          return;
        }
        marker.setPopupContent(`<strong>${city.name}</strong><br>Loading…`);
        const price = await fetchPrice(city.code);
        if (!price) {
          marker.setPopupContent(`<strong>${city.name}</strong><br>No data available.`);
          return;
        }
        setSelected(city.name, price.value, "USD", "gallon", "City average", city.code);
        registerPriceRender(marker.getPopup(), () => {
          marker.setPopupContent(
            `<strong>${city.name}</strong><br>` +
            `${formatPrice(price.value, "USD", "gallon")}<br>` +
            `<small>City average · Week of ${price.period}</small>`
          );
        });
      });
    });

    // ----- EU COUNTRIES (Slice 2) ---------------------------------------------
    //
    // Two files, both shipped with the repo (no API key, no server):
    //   data/eu-countries.geojson — country polygons (one per EU member)
    //   data/eu-prices.json       — latest weekly prices, refreshed by
    //                                scripts/fetch_eu_prices.py
    //
    // We start fetching the prices JSON immediately so it's likely already
    // resolved by the time a user clicks a country. The geojson fetch builds
    // the visible layer; the click handler `await`s the prices Promise.

    const euPricesPromise = fetch("data/eu-prices.json")
      .then((r) => r.json())
      .catch((err) => {
        console.error("EU prices load failed", err);
        return null;
      });

    fetch("data/eu-countries.geojson")
      .then((r) => r.json())
      .then((data) => {
        euCountriesLayer = L.geoJSON(data, {
          style: euStyleFor(),
          onEachFeature: (feature, layer) => {
            const { name, iso2 } = feature.properties;
            searchIndex.push({ name, source: "EU", layer });
            if (iso2) regionByKey.set(iso2, layer);

            layer.on("mouseover", () => layer.setStyle({ fillOpacity: POLYGON_HOVER_OPACITY }));
            layer.on("mouseout",  () => layer.setStyle({ fillOpacity: POLYGON_REST_OPACITY }));

            layer.on("click", async () => {
              const { iso2 } = feature.properties;
              if (iso2) updateHash({ region: iso2 });
              const popup = L.popup()
                .setLatLng(layer.getBounds().getCenter())
                .setContent(`<strong>${name}</strong><br>Loading…`)
                .openOn(map);

              const prices = await euPricesPromise;
              if (!prices) {
                popup.setContent(`<strong>${name}</strong><br>Price data failed to load.`);
                return;
              }
              const entry = prices.countries[iso2];
              if (!entry || entry.gasoline_eur_per_l == null) {
                popup.setContent(`<strong>${name}</strong><br>No data available.`);
                return;
              }
              // 3 decimals because European pump signs typically show
              // €/L to the tenth-of-a-cent (e.g. 1.829 €/L).
              setSelected(name, entry.gasoline_eur_per_l, "EUR", "litre", "EU Weekly Oil Bulletin", null);
              registerPriceRender(popup, () => {
                popup.setContent(
                  `<strong>${name}</strong><br>` +
                  `${formatPrice(entry.gasoline_eur_per_l, "EUR", "litre")} (Euro-super 95)<br>` +
                  `<small>EU Weekly Oil Bulletin · Week of ${prices.week_of}</small><br>` +
                  `<a class="popup-news-link" href="news/?country=${encodeURIComponent(name)}">News →</a>`
                );
              });
            });
          },
        }).addTo(map);
        paintHeatmap();
        tryApplyDeepLink();
      })
      .catch((err) => console.error("Failed to load EU country shapes", err));

    // ----- WORLD COUNTRIES (Slice 3) --------------------------------------
    //
    // Rest of the world, sourced from globalpetrolprices.com via the python
    // script in scripts/fetch_world_prices.py. Same pattern as the EU layer:
    // two files shipped with the repo, no API key, no server.
    //
    //   data/world-countries.geojson — polygons for ~150 countries (US and
    //                                   EU members are filtered out so the
    //                                   world layer doesn't overlap the
    //                                   state / EU layers)
    //   data/world-prices.json       — { iso2: { name, gasoline_usd_per_l } }
    //                                   for ~170 countries
    //
    // Country labels are deliberately omitted here — at world-view zoom
    // there are too many polygons for permanent labels to be legible; the
    // green fill is signal enough that the shape is clickable, and hover
    // brightens the country under the cursor.

    const worldPricesPromise = fetch("data/world-prices.json")
      .then((r) => r.json())
      .catch((err) => {
        console.error("world prices load failed", err);
        return null;
      });

    function worldStyleFor() { return polygonFallbackStyle(); }

    fetch("data/world-countries.geojson")
      .then((r) => r.json())
      .then((data) => {
        worldCountriesLayer = L.geoJSON(data, {
          style: worldStyleFor(),
          onEachFeature: (feature, layer) => {
            const { name, iso2 } = feature.properties;
            searchIndex.push({ name, source: "World", layer });
            if (iso2) regionByKey.set(iso2, layer);

            layer.on("mouseover", () => layer.setStyle({ fillOpacity: POLYGON_HOVER_OPACITY }));
            layer.on("mouseout",  () => layer.setStyle({ fillOpacity: POLYGON_REST_OPACITY }));

            layer.on("click", async () => {
              if (iso2) updateHash({ region: iso2 });
              const popup = L.popup()
                .setLatLng(layer.getBounds().getCenter())
                .setContent(`<strong>${name}</strong><br>Loading…`)
                .openOn(map);

              const prices = await worldPricesPromise;
              if (!prices) {
                popup.setContent(`<strong>${name}</strong><br>Price data failed to load.`);
                return;
              }
              const entry = prices.countries[iso2];
              if (!entry || entry.gasoline_usd_per_l == null) {
                popup.setContent(`<strong>${name}</strong><br>No data available.`);
                return;
              }
              // GPP refreshes weekly but doesn't expose the exact "week of"
              // — show the date we last ran the fetch script instead.
              const updated = prices.updated_at.slice(0, 10);
              setSelected(name, entry.gasoline_usd_per_l, "USD", "litre", "GlobalPetrolPrices.com", null);
              registerPriceRender(popup, () => {
                popup.setContent(
                  `<strong>${name}</strong><br>` +
                  `${formatPrice(entry.gasoline_usd_per_l, "USD", "litre")}<br>` +
                  `<small>GlobalPetrolPrices.com · Updated ${updated}</small><br>` +
                  `<a class="popup-news-link" href="news/?country=${encodeURIComponent(name)}">News →</a>`
                );
              });
            });
          },
        }).addTo(map);
        paintHeatmap();
        tryApplyDeepLink();
      })
      .catch((err) => console.error("Failed to load world country shapes", err));

    // ----- US GAS STATIONS (Slice 4) --------------------------------------
    //
    // Individual stations scraped from GasBuddy (see
    // scripts/scrape_gasbuddy_cities.py). The output JSON is ~570 stations
    // across ~57 metros, with per-station lat/lng + USD/gallon price.
    //
    // Two things to know about the display:
    //   1. Zoom gating. 570 dots on top of the state polygons at low zoom
    //      is visual mush. We add the layer to the map only once the user
    //      has zoomed in past STATIONS_MIN_ZOOM (≈ metro level).
    //   2. Color encodes price. A linear green→red gradient over the
    //      observed range ($3.40 cheap → $5.40 expensive) so a glance at
    //      a cluster of dots shows the spread, not just the locations.
    //
    // ~44% of stations have no recent price report (price_usd_per_gallon
    // is null). We skip those — a marker we can't price is more confusing
    // than helpful.

    const STATIONS_MIN_ZOOM = 7;

    // Green (low) → yellow → red (high). The HSL hue trick: hue 120 is
    // green, hue 0 is red, the values in between sweep through yellow.
    function stationColor(usdPerGallon) {
      const t = Math.max(0, Math.min(1, (usdPerGallon - 3.40) / 2.00));
      const hue = 120 - 120 * t;
      return `hsl(${hue}, 70%, 45%)`;
    }

    // We hold onto the layer so a `zoomend` listener can add/remove it
    // without re-creating 300+ markers each time.
    let stationsLayer = null;

    function updateStationsVisibility() {
      if (!stationsLayer) return;
      const shouldShow = map.getZoom() >= STATIONS_MIN_ZOOM;
      if (shouldShow && !map.hasLayer(stationsLayer)) {
        stationsLayer.addTo(map);
      } else if (!shouldShow && map.hasLayer(stationsLayer)) {
        map.removeLayer(stationsLayer);
      }
    }

    fetch("data/us-city-prices.json")
      .then((r) => r.json())
      .then((data) => {
        // `updated` is a unix timestamp (seconds) of when the scraper ran.
        const updatedDate = new Date(data.updated * 1000)
          .toISOString().slice(0, 10);

        stationsLayer = L.layerGroup();
        Object.values(data.cities).flat().forEach((s) => {
          if (s.price_usd_per_gallon == null) return;  // skip "—" stations

          const marker = L.circleMarker([s.lat, s.lng], {
            radius: 5,
            color: "rgba(0,0,0,0.5)",   // thin dark outline for legibility
            weight: 1,
            fillColor: stationColor(s.price_usd_per_gallon),
            fillOpacity: 0.9,
          });
          marker.bindPopup(`<strong>${s.brand || s.name}</strong><br>Loading…`);
          marker.on("click", () => {
            updateHash({ region: null }); // station selections aren't deep-linkable
            setSelected(
              `${s.brand || s.name} (${s.city})`,
              s.price_usd_per_gallon, "USD", "gallon",
              "GasBuddy station",
              null
            );
            registerPriceRender(marker.getPopup(), () => {
              marker.setPopupContent(
                `<strong>${s.brand || s.name}</strong><br>` +
                `${formatPrice(s.price_usd_per_gallon, "USD", "gallon")}<br>` +
                `<small>${s.address}, ${s.city}, ${s.state} · ` +
                `GasBuddy · Updated ${updatedDate}</small>`
              );
            });
          });
          stationsLayer.addLayer(marker);
        });

        updateStationsVisibility();
        map.on("zoomend", updateStationsVisibility);
      })
      .catch((err) => console.error("Failed to load GasBuddy station data", err));

    // ----- HEATMAP -----------------------------------------------------------
    //
    // Every clickable polygon (US state, EU country, world country) is
    // recolored by its current gasoline price on a shared USD-per-litre
    // scale: green = cheap, yellow ≈ global avg, red = expensive. Same
    // convention as the GasBuddy station dots above.
    //
    // Scale rationale: world gasoline ranges roughly $0.02/L (Libya) to
    // $2.30/L (Hong Kong/Denmark). Clamping to [$0.20, $2.20] with a
    // midpoint near the global average ($1.20/L) keeps almost all real
    // countries inside the band so subtle differences are still visible.

    const HEATMAP_MIN_USD_PER_L = 0.20;
    const HEATMAP_MAX_USD_PER_L = 2.20;

    // Map a USD/L value to a HSL hue in [0, 120]. Below MIN clamps to deep
    // green, above MAX clamps to deep red.
    function priceColor(usdPerLitre) {
      const span = HEATMAP_MAX_USD_PER_L - HEATMAP_MIN_USD_PER_L;
      const t = Math.max(0, Math.min(1, (usdPerLitre - HEATMAP_MIN_USD_PER_L) / span));
      const hue = 120 - 120 * t;
      return `hsl(${hue}, 70%, 45%)`;
    }

    // Convert a price in (currency, unit) into USD per litre, the single
    // axis the heatmap is built on. Mirrors the FX/unit logic in
    // formatPrice() but always outputs USD/L regardless of user currency.
    function toUsdPerLitre(value, nativeCurrency, nativeUnit) {
      const usdPerNative = value * FX_TO_USD[nativeCurrency];
      return nativeUnit === "gallon" ? usdPerNative / LITRES_PER_GALLON : usdPerNative;
    }

    // Re-style every feature in `geoJsonLayer` whose feature key (under
    // `keyProp`) has a price in `priceMap`. `priceMap` is { key -> USD/L }.
    // Both the stroke and fill take the heat color — stroke at full opacity,
    // fill at REST_OPACITY — so the borders pop while the fill stays soft.
    // Untouched features keep the fallback style from polygonFallbackStyle().
    function paintLayer(geoJsonLayer, keyProp, priceMap) {
      if (!geoJsonLayer) return;
      geoJsonLayer.eachLayer((featureLayer) => {
        const key = featureLayer.feature?.properties?.[keyProp];
        const usdPerL = priceMap[key];
        if (usdPerL == null) return;
        const c = priceColor(usdPerL);
        featureLayer.setStyle({
          color: c,
          weight: POLYGON_STROKE_WEIGHT,
          opacity: 1,
          fillColor: c,
          fillOpacity: POLYGON_REST_OPACITY,
        });
      });
    }

    async function paintHeatmap() {
      const [us, eu, world] = await Promise.all([usPricesPromise, euPricesPromise, worldPricesPromise]);

      // US states are keyed by full name in the GeoJSON ("California"),
      // so build a name -> USD/L map by translating us-prices.json (keyed
      // by 2-letter code, valued in USD/gal).
      if (us?.states) {
        const usByName = {};
        for (const [code, entry] of Object.entries(us.states)) {
          if (entry.gasoline_usd_per_gallon == null) continue;
          usByName[entry.name] = toUsdPerLitre(entry.gasoline_usd_per_gallon, "USD", "gallon");
        }
        paintLayer(statesLayer, "name", usByName);
      }

      if (eu?.countries) {
        const euByIso = {};
        for (const [iso2, entry] of Object.entries(eu.countries)) {
          if (entry.gasoline_eur_per_l == null) continue;
          euByIso[iso2] = toUsdPerLitre(entry.gasoline_eur_per_l, "EUR", "litre");
        }
        paintLayer(euCountriesLayer, "iso2", euByIso);
      }

      if (world?.countries) {
        const worldByIso = {};
        for (const [iso2, entry] of Object.entries(world.countries)) {
          if (entry.gasoline_usd_per_l == null) continue;
          worldByIso[iso2] = entry.gasoline_usd_per_l;
        }
        paintLayer(worldCountriesLayer, "iso2", worldByIso);
      }
    }

    // Legend: a Leaflet control pinned bottom-left, mounted once at startup.
    // Labels render the min/mid/max in the user's selected currency, refreshed
    // by refreshLegend() when the currency dropdown changes.
    function renderLegendHTML() {
      const min = formatPrice(HEATMAP_MIN_USD_PER_L, "USD", "litre");
      const mid = formatPrice((HEATMAP_MIN_USD_PER_L + HEATMAP_MAX_USD_PER_L) / 2, "USD", "litre");
      const max = formatPrice(HEATMAP_MAX_USD_PER_L, "USD", "litre");
      return `
        <div class="legend-title">Gasoline price</div>
        <div class="legend-bar"></div>
        <div class="legend-labels">
          <span>${min}</span><span>${mid}</span><span>${max}</span>
        </div>
      `;
    }

    const legendControl = L.control({ position: "bottomleft" });
    legendControl.onAdd = () => {
      const div = L.DomUtil.create("div", "legend");
      div.innerHTML = renderLegendHTML();
      return div;
    };
    legendControl.addTo(map);

    function refreshLegend() {
      const container = legendControl.getContainer();
      if (container) container.innerHTML = renderLegendHTML();
    }

    // ----- GLOBAL SNAPSHOT SIDEBAR -------------------------------------
    //
    // The right-hand panel shows five "at-a-glance" prices that don't
    // require any clicking: world min/max, US national avg, EU avg, and
    // whichever region the user last clicked. Re-rendered whenever the
    // currency dropdown changes so the big numbers always read in the
    // user's chosen units.

    // Split a formatted price into the big number + small unit suffix so
    // the snapshot card can render them with different styles
    // (e.g. "$3.24" big white, "/gal" small muted).
    function formatPriceParts(value, nativeCurrency, nativeUnit) {
      const target = getCurrency();
      const usdPerNativeUnit = value * FX_TO_USD[nativeCurrency];
      let out = usdPerNativeUnit / FX_TO_USD[target];
      const targetUnit = UNIT_FOR_CURRENCY[target];
      if (nativeUnit !== targetUnit) {
        out = nativeUnit === "gallon"
          ? out / LITRES_PER_GALLON
          : out * LITRES_PER_GALLON;
      }
      const dp = targetUnit === "gallon" ? 2 : 3;
      return {
        big: `${CURRENCY_SYMBOL[target]}${out.toFixed(dp)}`,
        unit: targetUnit === "gallon" ? "/gal" : "/L",
      };
    }

    function setSnapPrice(elId, value, nativeCurrency, nativeUnit) {
      const { big, unit } = formatPriceParts(value, nativeCurrency, nativeUnit);
      document.getElementById(elId).innerHTML =
        `${big}<span class="unit">${unit}</span>`;
    }

    // snapshotData holds the *raw* values (in their native currency/unit) so
    // we can re-render them in whichever currency the user picks. Without
    // this we'd lose precision on every currency switch.
    const snapshotData = {
      cheapest: null,    // { name, usdPerL }
      expensive: null,   // { name, usdPerL }
      globalAverage: null, // { usdPerL, countryCount } — US counted once
      usAverage: null,   // { usdPerGallon, weekOf }
      euAverage: null,   // { eurPerL, weekOf }
      // selected.eiaSeries (optional) is the EIA duoarea code we use to
      // pull a historical chart for the selected region. EU/world clicks
      // don't have one — we don't have historical data for those layers.
      selected: null,    // { name, value, currency, unit, source, eiaSeries }
      usHistory: null,   // [{ period, value }] in USD/gal
    };

    function setSelected(name, value, currency, unit, source, eiaSeries) {
      snapshotData.selected = { name, value, currency, unit, source, eiaSeries };
      renderSnapshot();
    }

    // ---------- HISTORICAL CHARTS (Chart.js) -------------------------------
    //
    // EIA's same /petroleum/pri/gnd/data/ endpoint we use for the current
    // price also serves historical weekly points — we just ask for many
    // rows instead of one. We cache results per (series, weeks) so flipping
    // currency doesn't re-hit the network.

    const historyCache = new Map(); // key: `${series}|${weeks}` -> [{period,value}]

    async function fetchHistory(duoareaCode, weeks = 52) {
      const cacheKey = `${duoareaCode}|${weeks}`;
      if (historyCache.has(cacheKey)) return historyCache.get(cacheKey);
      if (!keyIsSet()) return null;
      const url = "https://api.eia.gov/v2/petroleum/pri/gnd/data/"
        + "?frequency=weekly"
        + "&data[0]=value"
        + `&facets[duoarea][]=${duoareaCode}`
        + "&facets[product][]=EPMR"
        + "&sort[0][column]=period"
        + "&sort[0][direction]=desc"
        + `&offset=0&length=${weeks}`
        + `&api_key=${EIA_API_KEY}`;
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        const json = await res.json();
        const rows = json?.response?.data || [];
        // EIA returns newest first; reverse so the chart reads left=old, right=new.
        const points = rows.reverse().map((r) => ({
          period: r.period,
          value: parseFloat(r.value),
        }));
        historyCache.set(cacheKey, points);
        return points;
      } catch (err) {
        console.error("EIA history fetch failed for", duoareaCode, err);
        return null;
      }
    }

    // Holds the Chart.js instance per canvas id so we can destroy it before
    // re-rendering (Chart.js will leak if you stack chart instances on a
    // single canvas).
    const chartInstances = {};

    function getAccentColors() {
      const css = getComputedStyle(document.body);
      return {
        accent:     css.getPropertyValue("--accent").trim()      || "#5eead4",
        accentSoft: css.getPropertyValue("--accent-soft").trim() || "rgba(94,234,212,0.10)",
      };
    }

    // External-HTML tooltip handler. Renders the tooltip into a sibling
    // <div class="snap-chart-tooltip"> so the popup lives in the reserved
    // padding-top area of .snap-chart — never on top of the chart line.
    function externalSparklineTooltip(context) {
      const { chart, tooltip } = context;
      const wrap = chart.canvas.parentNode;
      const el = wrap.querySelector(".snap-chart-tooltip");
      if (!el) return;

      // Chart.js sets opacity=0 when the user moves the cursor off the chart.
      if (tooltip.opacity === 0) { el.style.opacity = 0; return; }

      const title = (tooltip.title && tooltip.title[0]) || "";
      const body  = (tooltip.body[0] && tooltip.body[0].lines[0]) || "";
      el.innerHTML =
        `<span class="ct-date">${title}</span>` +
        `<span class="ct-price">${body}</span>`;

      // Position: caretX is in canvas pixels; canvas sits below the 30px
      // padding-top, so caretX maps directly to .snap-chart's X axis. We
      // clamp so the tooltip never gets cut off at the container edges.
      el.style.opacity = 1;
      const wrapW = wrap.clientWidth;
      const halfW = el.offsetWidth / 2;
      const x = Math.max(halfW + 2, Math.min(wrapW - halfW - 2, tooltip.caretX));
      el.style.left = `${x}px`;
    }

    // Draws (or redraws) a sparkline into the given canvas. `history` is the
    // array from fetchHistory(); nativeCurrency/Unit are how those values
    // are denominated — the tooltip uses formatPrice() to convert into the
    // user's selected currency on the fly.
    function renderSparkline(canvasId, history, nativeCurrency, nativeUnit) {
      const canvas = document.getElementById(canvasId);
      if (!canvas || !history || !history.length) return;
      if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

      const { accent, accentSoft } = getAccentColors();

      chartInstances[canvasId] = new Chart(canvas.getContext("2d"), {
        type: "line",
        data: {
          labels: history.map((h) => h.period),
          datasets: [{
            data: history.map((h) => h.value),
            borderColor: accent,
            backgroundColor: accentSoft,
            borderWidth: 1.5,
            fill: true,
            pointRadius: 0,
            pointHoverRadius: 3,
            pointHoverBackgroundColor: accent,
            tension: 0.3,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 250 },
          interaction: { mode: "index", intersect: false },
          scales: {
            x: { display: false },
            y: { display: false, grace: "10%" },
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              enabled: false,            // hide the built-in canvas tooltip
              external: externalSparklineTooltip,
              callbacks: {
                title: (items) => items[0].label,
                label: (item) => formatPrice(item.parsed.y, nativeCurrency, nativeUnit),
              },
            },
          },
        },
      });
    }

    function clearSparkline(canvasId) {
      if (chartInstances[canvasId]) {
        chartInstances[canvasId].destroy();
        delete chartInstances[canvasId];
      }
    }

    async function buildSnapshot() {
      const [us, eu, world] = await Promise.all([
        usPricesPromise, euPricesPromise, worldPricesPromise,
      ]);

      // Kick off the US national historical fetch in parallel with the rest
      // of the snapshot. "NUS" = EIA's duoarea code for the national average.
      fetchHistory("NUS", 52).then((history) => {
        if (history) {
          snapshotData.usHistory = history;
          renderSnapshot();
        }
      });

      // World min/max: scan every country across BOTH the world feed and the
      // EU feed (the EU layer carves its members out of the world layer, so
      // we'd otherwise miss EU countries when looking for extremes).
      const allCountries = [];
      if (world?.countries) {
        for (const e of Object.values(world.countries)) {
          if (e.gasoline_usd_per_l != null) {
            allCountries.push({ name: e.name, usdPerL: e.gasoline_usd_per_l });
          }
        }
      }
      if (eu?.countries) {
        for (const e of Object.values(eu.countries)) {
          if (e.gasoline_eur_per_l != null) {
            allCountries.push({
              name: e.name,
              usdPerL: toUsdPerLitre(e.gasoline_eur_per_l, "EUR", "litre"),
            });
          }
        }
      }
      if (allCountries.length) {
        allCountries.sort((a, b) => a.usdPerL - b.usdPerL);
        snapshotData.cheapest  = allCountries[0];
        snapshotData.expensive = allCountries[allCountries.length - 1];
      }

      // US national avg: arithmetic mean of state-level USD/gallon. Not a
      // population-weighted average — close enough for an at-a-glance figure.
      if (us?.states) {
        const vals = Object.values(us.states)
          .map((e) => e.gasoline_usd_per_gallon)
          .filter((v) => v != null);
        if (vals.length) {
          snapshotData.usAverage = {
            usdPerGallon: vals.reduce((a, b) => a + b, 0) / vals.length,
            weekOf: us.week_of || "this week",
          };
        }
      }

      if (eu?.countries) {
        const vals = Object.values(eu.countries)
          .map((e) => e.gasoline_eur_per_l)
          .filter((v) => v != null);
        if (vals.length) {
          snapshotData.euAverage = {
            eurPerL: vals.reduce((a, b) => a + b, 0) / vals.length,
            weekOf: eu.week_of,
          };
        }
      }

      // Global avg: the US contributes one entry (its national average),
      // each EU country one, each remaining world country one. Without
      // collapsing the US, 50 states would drown out everywhere else and
      // drag the global mean toward US prices. All values normalized to
      // USD/L before averaging so units don't mix.
      const allCountryPrices = [];
      if (snapshotData.usAverage) {
        allCountryPrices.push(
          toUsdPerLitre(snapshotData.usAverage.usdPerGallon, "USD", "gallon")
        );
      }
      if (eu?.countries) {
        for (const e of Object.values(eu.countries)) {
          if (e.gasoline_eur_per_l != null) {
            allCountryPrices.push(toUsdPerLitre(e.gasoline_eur_per_l, "EUR", "litre"));
          }
        }
      }
      if (world?.countries) {
        for (const e of Object.values(world.countries)) {
          if (e.gasoline_usd_per_l != null) {
            allCountryPrices.push(e.gasoline_usd_per_l);
          }
        }
      }
      if (allCountryPrices.length) {
        snapshotData.globalAverage = {
          usdPerL: allCountryPrices.reduce((a, b) => a + b, 0) / allCountryPrices.length,
          countryCount: allCountryPrices.length,
        };
      }

      renderSnapshot();
    }

    function renderSnapshot() {
      if (snapshotData.cheapest) {
        setSnapPrice("snap-cheapest-price",
          snapshotData.cheapest.usdPerL, "USD", "litre");
        document.getElementById("snap-cheapest-place").textContent =
          snapshotData.cheapest.name;
      }
      if (snapshotData.expensive) {
        setSnapPrice("snap-expensive-price",
          snapshotData.expensive.usdPerL, "USD", "litre");
        document.getElementById("snap-expensive-place").textContent =
          snapshotData.expensive.name;
      }
      if (snapshotData.globalAverage) {
        setSnapPrice("snap-global-price",
          snapshotData.globalAverage.usdPerL, "USD", "litre");
        document.getElementById("snap-global-source").innerHTML =
          `<span class="meta">${snapshotData.globalAverage.countryCount} countries · US counted as one</span>`;
      }
      if (snapshotData.usAverage) {
        setSnapPrice("snap-us-price",
          snapshotData.usAverage.usdPerGallon, "USD", "gallon");
        document.getElementById("snap-us-source").innerHTML =
          `<span class="meta">EIA · Week of ${snapshotData.usAverage.weekOf}</span>`;
      }
      // US national sparkline. Shown only once the history fetch completes.
      const usChartWrap = document.getElementById("snap-us-chart-wrap");
      if (snapshotData.usHistory) {
        usChartWrap.hidden = false;
        renderSparkline("snap-us-chart",
          snapshotData.usHistory, "USD", "gallon");
      } else {
        usChartWrap.hidden = true;
      }

      if (snapshotData.euAverage) {
        setSnapPrice("snap-eu-price",
          snapshotData.euAverage.eurPerL, "EUR", "litre");
        document.getElementById("snap-eu-source").innerHTML =
          `<span class="meta">Oil Bulletin · Week of ${snapshotData.euAverage.weekOf}</span>`;
      }

      const selChartWrap = document.getElementById("snap-selected-chart-wrap");
      if (snapshotData.selected) {
        const s = snapshotData.selected;
        setSnapPrice("snap-selected-price", s.value, s.currency, s.unit);
        document.getElementById("snap-selected-source").innerHTML =
          `${s.name}<br><span class="meta">${s.source}</span>`;

        // Sparkline if we have a US-side EIA series for this selection.
        // We re-fetch each click but fetchHistory caches per series, so a
        // currency switch never re-hits the network.
        if (s.eiaSeries) {
          fetchHistory(s.eiaSeries, 52).then((history) => {
            // Bail if the selection has changed while the fetch was in flight.
            if (snapshotData.selected !== s) return;
            if (history && history.length) {
              selChartWrap.hidden = false;
              renderSparkline("snap-selected-chart",
                history, s.currency, s.unit);
            } else {
              selChartWrap.hidden = true;
              clearSparkline("snap-selected-chart");
            }
          });
        } else {
          selChartWrap.hidden = true;
          clearSparkline("snap-selected-chart");
        }
      } else {
        selChartWrap.hidden = true;
      }
    }

    buildSnapshot();
  </script>
</body>
</html>
