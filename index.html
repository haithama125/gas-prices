<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gas Prices</title>

  <!-- Leaflet: a free map library. Loaded from a CDN so we don't need to install anything. -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* CSS custom properties (a.k.a. variables) — declared once on :root, then
       referenced below as var(--name). Swapping the [data-theme="light"] block
       changes every value at once, which is how the light/dark toggle works. */
    :root {
      --page-bg:         #1a1a1a;
      --header-bg:       #1a1a1a;
      --header-text:     #ffffff;
      --header-subtle:   rgba(255, 255, 255, 0.7);
      --header-border:   transparent;
      --toggle-bg:       rgba(255, 255, 255, 0.1);
      --toggle-border:   rgba(255, 255, 255, 0.25);
      --toggle-text:     #ffffff;
      --popup-bg:        #1f2937;
      --popup-text:      #e5e7eb;
      --popup-muted:     #9ca3af;
      --attribution-bg:  rgba(31, 41, 55, 0.85);
      --attribution-text:#d1d5db;
      --link:            #93c5fd;
      --label-color:     #60a5fa;
      --label-halo:      #000;
      /* EU countries get a different palette so they don't visually blur
         into the US states once you pan across the Atlantic. */
      --eu-stroke:       #fbbf24;
      --eu-fill:         #f59e0b;
      --eu-label-color:  #fbbf24;
      /* World countries (slice 3) — third palette, an emerald green, so
         the three clickable groups (US blue / EU amber / world green) are
         visually distinct once you zoom out to see the whole world. */
      --world-stroke:    #34d399;
      --world-fill:      #10b981;
    }

    [data-theme="light"] {
      --page-bg:         #ffffff;
      --header-bg:       #ffffff;
      --header-text:     #1e3a8a;   /* deep blue */
      --header-subtle:   #3b82f6;
      --header-border:   #dbeafe;   /* faint blue line under the header */
      --toggle-bg:       #eff6ff;
      --toggle-border:   #bfdbfe;
      --toggle-text:     #1e3a8a;
      --popup-bg:        #ffffff;
      --popup-text:      #1f2937;
      --popup-muted:     #6b7280;
      --attribution-bg:  rgba(255, 255, 255, 0.85);
      --attribution-text:#374151;
      --link:            #2563eb;
      --label-color:     #1e40af;   /* darker blue so it shows on light tiles */
      --label-halo:      #ffffff;
      --eu-stroke:       #b45309;   /* darker amber, readable on Positron */
      --eu-fill:         #f59e0b;
      --eu-label-color:  #92400e;
      --world-stroke:    #047857;   /* darker emerald, readable on Positron */
      --world-fill:      #10b981;
    }

    /* Reset default body margin so the map can fill the screen */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--page-bg);  /* matches header — any briefly-blank edges look intentional */
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      background: var(--header-bg);
      color: var(--header-text);
      border-bottom: 1px solid var(--header-border);
    }

    header h1 {
      margin: 0;
      font-size: 1.25rem;
    }

    header p {
      margin: 0.25rem 0 0;
      font-size: 0.85rem;
      color: var(--header-subtle);
    }

    /* Group the header controls (currency + theme) so they sit together
       on the right. */
    .header-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    #theme-toggle,
    #currency-select {
      background: var(--toggle-bg);
      color: var(--toggle-text);
      border: 1px solid var(--toggle-border);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      font: inherit;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #theme-toggle:hover,
    #currency-select:hover { opacity: 0.85; }

    /* Map fills the rest of the screen below the header */
    #map {
      height: calc(100vh - 78px);
      width: 100%;
    }

    /* Popup styling. Leaflet renders the popup as a "wrapper" with a little
       triangle "tip" — both need the same background so they look like one piece. */
    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: var(--popup-bg);
      color: var(--popup-text);
    }
    .leaflet-popup-content {
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .leaflet-popup-content small {
      color: var(--popup-muted);   /* muted for the source/date line */
    }
    .leaflet-popup-close-button {
      color: var(--popup-muted) !important;
    }
    /* Attribution links at the bottom of the map */
    .leaflet-container a {
      color: var(--link);
    }
    /* Attribution background, normally white */
    .leaflet-control-attribution {
      background: var(--attribution-bg) !important;
      color: var(--attribution-text);
    }

    /* State-name labels drawn at the center of each state polygon.
       We strip Leaflet's default tooltip chrome (white bg, border, arrow)
       so it looks like plain text on the map. */
    .state-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: var(--label-color);
      font-size: 0.7rem;
      font-weight: 600;
      text-shadow: 0 0 3px var(--label-halo), 0 0 3px var(--label-halo);
      pointer-events: none;        /* don't intercept clicks meant for the state */
      white-space: nowrap;
    }
    .state-label::before {
      display: none;                /* hide the default tooltip pointer arrow */
    }

    /* EU country labels — same idea as .state-label but in the EU palette so
       you can tell at a glance whether a clickable shape is a US state
       (blue) or an EU country (amber). */
    .country-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: var(--eu-label-color);
      font-size: 0.7rem;
      font-weight: 600;
      text-shadow: 0 0 3px var(--label-halo), 0 0 3px var(--label-halo);
      pointer-events: none;
      white-space: nowrap;
    }
    .country-label::before { display: none; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Gas Prices</h1>
      <p>Click anywhere on the map</p>
    </div>
    <div class="header-controls">
      <!-- Currency dropdown. The selected currency dictates BOTH the symbol
           AND the unit shown in popups (USD → /gallon, others → /litre),
           because that's how people in each market read pump prices. -->
      <select id="currency-select" aria-label="Display currency">
        <option value="USD">USD ($/gallon)</option>
        <option value="EUR">EUR (€/litre)</option>
        <option value="GBP">GBP (£/litre)</option>
        <option value="CAD">CAD (C$/litre)</option>
      </select>
      <button id="theme-toggle" type="button" aria-label="Toggle light/dark mode">Light mode</button>
    </div>
  </header>

  <div id="map"></div>

  <script>
    // ----- CONFIG -------------------------------------------------------------

    // EIA API key — register for free at https://www.eia.gov/opendata/register.php
    // (Takes ~30 seconds. They email you the key.) Paste it in the quotes below.
    const EIA_API_KEY = "xcUs1Wmv2tgVjJBIRvMJYd6NCYvo5JTdVkJPHSjE";

    // ----- CURRENCY -----------------------------------------------------------
    //
    // We display every price in the user's selected currency. Each data source
    // gives us prices in one "native" currency + unit (USD/gallon for EIA,
    // EUR/litre for the EU bulletin), and `formatPrice` does the conversion.
    //
    // FX rates are hardcoded snapshots — refresh them by hand occasionally
    // (rates from https://www.frankfurter.app, a free ECB-backed feed; the
    // numbers below were last set on 2026-05-18). For a personal project these
    // are accurate enough; if it ever matters, fetch live rates on page load.

    const FX_TO_USD = { USD: 1.00, EUR: 1.08, GBP: 1.27, CAD: 0.73 };

    // Each currency has a "home" unit — what people in that market expect to
    // see on a pump sign. USD is per-gallon (US convention), everyone else
    // is per-litre.
    const UNIT_FOR_CURRENCY = { USD: "gallon", EUR: "litre", GBP: "litre", CAD: "litre" };
    const CURRENCY_SYMBOL   = { USD: "$",      EUR: "€",     GBP: "£",     CAD: "C$" };
    const LITRES_PER_GALLON = 3.78541;

    function getCurrency() {
      return localStorage.getItem("gp-currency") || "USD";
    }

    // ----- POPUP PRICE RENDERING ---------------------------------------------
    //
    // Currency can change after a popup is already open. Rather than scraping
    // numbers out of popup HTML, each price popup registers a render function
    // here when it opens. On currency change we re-run all of them.
    //
    // Cleanup: when the popup closes, the `once("remove", ...)` hook removes
    // its entry so the Map doesn't grow over time.
    const popupRenderers = new Map(); // popup instance -> render fn

    function registerPriceRender(popup, renderFn) {
      // Set (not add) so re-clicking the same marker overwrites cleanly.
      popupRenderers.set(popup, renderFn);
      renderFn();
      popup.once("remove", () => popupRenderers.delete(popup));
    }

    function rerenderAllPricePopups() {
      popupRenderers.forEach((fn) => fn());
    }

    // Convert `value` (in `nativeCurrency` per `nativeUnit`) into the user's
    // currently-selected currency + its home unit, then return a formatted
    // string like "$3.27/gallon" or "€1.829/litre".
    //
    // Pipeline:
    //   value [native cur / native unit]
    //     -> USD per native unit    (multiply by FX_TO_USD[nativeCurrency])
    //     -> target cur per native unit (divide by FX_TO_USD[target])
    //     -> target cur per target unit (litre↔gallon conversion if needed)
    function formatPrice(value, nativeCurrency, nativeUnit) {
      const target = getCurrency();
      const usdPerNativeUnit = value * FX_TO_USD[nativeCurrency];
      let out = usdPerNativeUnit / FX_TO_USD[target];
      const targetUnit = UNIT_FOR_CURRENCY[target];
      if (nativeUnit !== targetUnit) {
        out = nativeUnit === "gallon"
          ? out / LITRES_PER_GALLON   // $/gal -> $/L
          : out * LITRES_PER_GALLON;  // $/L  -> $/gal
      }
      // Gallons are bigger, so the per-gallon number is bigger and 2 decimal
      // places looks right ($3.27). Per-litre prices are smaller and people
      // are used to seeing 3 decimals (€1.829).
      const dp = targetUnit === "gallon" ? 2 : 3;
      return `${CURRENCY_SYMBOL[target]}${out.toFixed(dp)}/${targetUnit}`;
    }

    // ----- DATA LOOKUPS -------------------------------------------------------

    // The state-shapes GeoJSON we load below labels states by full name
    // (e.g. "California"). EIA uses 2-letter codes, so we need this bridge.
    const STATE_NAME_TO_CODE = {
      "Alabama": "AL", "Alaska": "AK", "Arizona": "AZ", "Arkansas": "AR",
      "California": "CA", "Colorado": "CO", "Connecticut": "CT", "Delaware": "DE",
      "District of Columbia": "DC", "Florida": "FL", "Georgia": "GA", "Hawaii": "HI",
      "Idaho": "ID", "Illinois": "IL", "Indiana": "IN", "Iowa": "IA",
      "Kansas": "KS", "Kentucky": "KY", "Louisiana": "LA", "Maine": "ME",
      "Maryland": "MD", "Massachusetts": "MA", "Michigan": "MI", "Minnesota": "MN",
      "Mississippi": "MS", "Missouri": "MO", "Montana": "MT", "Nebraska": "NE",
      "Nevada": "NV", "New Hampshire": "NH", "New Jersey": "NJ", "New Mexico": "NM",
      "New York": "NY", "North Carolina": "NC", "North Dakota": "ND", "Ohio": "OH",
      "Oklahoma": "OK", "Oregon": "OR", "Pennsylvania": "PA", "Rhode Island": "RI",
      "South Carolina": "SC", "South Dakota": "SD", "Tennessee": "TN", "Texas": "TX",
      "Utah": "UT", "Vermont": "VT", "Virginia": "VA", "Washington": "WA",
      "West Virginia": "WV", "Wisconsin": "WI", "Wyoming": "WY",
    };

    // EIA only publishes individual state-level weekly retail prices for these
    // ~9 states. The codes (e.g. "SCA") are EIA's "duoarea" identifiers.
    const STATE_EIA_CODES = {
      CA: "SCA", CO: "SCO", FL: "SFL", MA: "SMA", MN: "SMN",
      NY: "SNY", OH: "SOH", TX: "STX", WA: "SWA",
    };

    // PADDs = "Petroleum Administration for Defense Districts" — EIA's 5
    // regional groupings of the US. Every state belongs to exactly one.
    // For states without their own EIA series, we fall back to the PADD avg.
    const STATE_TO_PADD = {
      // PADD 1 — East Coast
      CT: "R10", DE: "R10", DC: "R10", FL: "R10", GA: "R10", ME: "R10",
      MD: "R10", MA: "R10", NH: "R10", NJ: "R10", NY: "R10", NC: "R10",
      PA: "R10", RI: "R10", SC: "R10", VT: "R10", VA: "R10", WV: "R10",
      // PADD 2 — Midwest
      IL: "R20", IN: "R20", IA: "R20", KS: "R20", KY: "R20", MI: "R20",
      MN: "R20", MO: "R20", NE: "R20", ND: "R20", OH: "R20", OK: "R20",
      SD: "R20", TN: "R20", WI: "R20",
      // PADD 3 — Gulf Coast
      AL: "R30", AR: "R30", LA: "R30", MS: "R30", NM: "R30", TX: "R30",
      // PADD 4 — Rocky Mountain
      CO: "R40", ID: "R40", MT: "R40", UT: "R40", WY: "R40",
      // PADD 5 — West Coast
      AK: "R50", AZ: "R50", CA: "R50", HI: "R50", NV: "R50", OR: "R50", WA: "R50",
    };

    const PADD_NAMES = {
      R10: "East Coast (PADD 1)",
      R20: "Midwest (PADD 2)",
      R30: "Gulf Coast (PADD 3)",
      R40: "Rocky Mountain (PADD 4)",
      R50: "West Coast (PADD 5)",
    };

    // For states made of disconnected pieces (Virginia's Eastern Shore,
    // Michigan's Upper Peninsula, etc.), Leaflet's auto-center for the label
    // gets pulled toward the separated chunk. Hardcode a [lat, lng] where the
    // label should actually sit. Add more entries here if other states look off.
    const LABEL_OVERRIDES = {
      "Virginia": [37.7, -78.5],   // central VA, away from the Eastern Shore
      "Michigan": [44.3, -85.0],   // Lower Peninsula
    };

    // Same idea for EU countries. Leaflet's polygon `getCenter()` is a
    // vertex-position average, so countries with a dense (jagged) southern
    // coast and a sparse (smoother) northern border end up with their label
    // dragged south. Hand-picked centers for the ones that look obviously off.
    const EU_LABEL_OVERRIDES = {
      "Spain":   [40.4, -3.7],   // Madrid — bbox center; default sits near Gibraltar
      "France":  [46.6,  2.2],   // central mainland
      "Sweden":  [62.5, 16.0],   // central Sweden, not the southern Baltic coast
      "Finland": [64.0, 26.0],   // central Finland
      "Italy":   [42.5, 12.5],   // central, away from Sicily/Sardinia pull
      "Norway":  [62.0,  9.5],   // not in EU but harmless if ever added
    };

    // Major metros EIA publishes separate weekly retail prices for.
    // The lat/lng is where the pin sits on the map.
    const CITY_PINS = [
      { name: "Boston",        code: "Y05BO", lat: 42.3601, lng:  -71.0589 },
      { name: "Chicago",       code: "Y35CH", lat: 41.8781, lng:  -87.6298 },
      { name: "Cleveland",     code: "Y05CL", lat: 41.4993, lng:  -81.6944 },
      { name: "Denver",        code: "Y45DV", lat: 39.7392, lng: -104.9903 },
      { name: "Houston",       code: "Y44HO", lat: 29.7604, lng:  -95.3698 },
      { name: "Los Angeles",   code: "Y05LA", lat: 34.0522, lng: -118.2437 },
      { name: "Miami",         code: "Y05MI", lat: 25.7617, lng:  -80.1918 },
      { name: "New York City", code: "Y35NY", lat: 40.7128, lng:  -74.0060 },
      { name: "San Francisco", code: "Y05SF", lat: 37.7749, lng: -122.4194 },
      { name: "Seattle",       code: "Y48SE", lat: 47.6062, lng: -122.3321 },
    ];

    // ----- MAP SETUP ----------------------------------------------------------

    // Create a Leaflet map inside the <div id="map">.
    // setView takes [latitude, longitude] and a zoom level (4 ≈ whole US).
    // maxBounds + maxBoundsViscosity pen the user to a single copy of the
    // world so they can't scroll horizontally into the void. Viscosity 1.0
    // makes the edge feel like a hard wall instead of a rubber band.
    const WORLD_BOUNDS = [[-85, -180], [85, 180]];
    const map = L.map("map", {
      maxBounds: WORLD_BOUNDS,
      maxBoundsViscosity: 1.0,
      worldCopyJump: false,
    }).setView([39.8283, -98.5795], 4);

    // Don't let the user zoom out past the point where the world stops
    // filling the viewport — otherwise blank bars appear on the sides of a
    // wide screen. `getBoundsZoom(..., true)` returns the smallest zoom at
    // which the viewport fits *inside* the world bounds, i.e. the zoom where
    // the map exactly covers the visible area. Recompute on resize so a
    // wider window correctly bumps the floor higher.
    function updateMinZoom() {
      map.setMinZoom(map.getBoundsZoom(WORLD_BOUNDS, true));
    }
    updateMinZoom();
    window.addEventListener("resize", updateMinZoom);

    // Two CARTO tile themes — "dark_all" (Dark Matter) and "light_all" (Positron).
    // Both are free, no API key, attribution required. {s}/{z}/{x}/{y} are
    // placeholders Leaflet fills in (subdomain + zoom + tile coordinates).
    const TILE_URLS = {
      dark:  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
      light: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
    };
    const TILE_OPTS = {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: "abcd",
      maxZoom: 19,
      // Stop tiles from repeating east/west — pairs with the map's
      // maxBounds so you only ever see one copy of the world.
      noWrap: true,
    };

    // We hold onto the active tile layer and the state-polygon layer so the
    // theme toggle below can swap/restyle them without re-creating the map.
    let tileLayer = null;
    let statesLayer = null;
    let euCountriesLayer = null;
    let worldCountriesLayer = null;

    // State polygon colors. Borders darken in light mode so they remain
    // visible on Positron's pale background.
    function stateStyleFor(theme) {
      return {
        color: theme === "light" ? "#2563eb" : "#60a5fa",
        weight: 1,
        fillColor: "#3b82f6",
        fillOpacity: 0.2,
      };
    }

    // EU country polygon style — pulled from the CSS variables so light/dark
    // toggling just works. We read them off <body> after applyTheme has run.
    function euStyleFor() {
      const css = getComputedStyle(document.body);
      return {
        color: css.getPropertyValue("--eu-stroke").trim(),
        weight: 1,
        fillColor: css.getPropertyValue("--eu-fill").trim(),
        fillOpacity: 0.2,
      };
    }

    // Read the current theme from the <body data-theme="..."> attribute.
    // Defaults to "dark" before applyTheme has run.
    function currentTheme() {
      return document.body.dataset.theme || "dark";
    }

    // Apply a theme: update the body attribute (so CSS variables flip),
    // swap the map tile layer, restyle the state polygons, update the toggle
    // button label, and remember the choice for next visit.
    function applyTheme(theme) {
      document.body.dataset.theme = theme;
      localStorage.setItem("gp-theme", theme);

      const btn = document.getElementById("theme-toggle");
      // Button text describes the *action*, not the current state.
      btn.textContent = theme === "light" ? "Dark mode" : "Light mode";

      if (tileLayer) map.removeLayer(tileLayer);
      tileLayer = L.tileLayer(TILE_URLS[theme], TILE_OPTS).addTo(map);

      if (statesLayer) statesLayer.setStyle(stateStyleFor(theme));
      // EU + world styles are read from CSS vars, which have already
      // updated above, so we just re-apply them.
      if (euCountriesLayer) euCountriesLayer.setStyle(euStyleFor());
      if (worldCountriesLayer) worldCountriesLayer.setStyle(worldStyleFor());
    }

    // Initial theme — saved preference if any, otherwise dark.
    applyTheme(localStorage.getItem("gp-theme") || "dark");

    document.getElementById("theme-toggle").addEventListener("click", () => {
      applyTheme(currentTheme() === "light" ? "dark" : "light");
    });

    // Currency dropdown: restore the saved choice on load, then save changes.
    // We don't try to retroactively rewrite open popups — the next click will
    // render in the new currency, which is good enough and avoids tracking
    // every popup's original native price.
    const currencySelect = document.getElementById("currency-select");
    currencySelect.value = getCurrency();
    currencySelect.addEventListener("change", (e) => {
      localStorage.setItem("gp-currency", e.target.value);
      rerenderAllPricePopups();
    });

    // ----- EIA FETCH ----------------------------------------------------------

    // Ask EIA for the most recent weekly retail price (regular gasoline = "EPMR")
    // for the given duoarea (region) code. Returns { value, period } or null.
    //
    // async/await note: fetch() returns a Promise (a future value). `await` pauses
    // this function until the Promise resolves, so we can write network code that
    // *reads* top-to-bottom instead of nesting callbacks.
    async function fetchPrice(duoareaCode) {
      const url = "https://api.eia.gov/v2/petroleum/pri/gnd/data/"
        + "?frequency=weekly"
        + "&data[0]=value"
        + `&facets[duoarea][]=${duoareaCode}`
        + "&facets[product][]=EPMR"
        + "&sort[0][column]=period"
        + "&sort[0][direction]=desc"
        + "&offset=0&length=1"
        + `&api_key=${EIA_API_KEY}`;
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        const json = await res.json();
        const row = json?.response?.data?.[0];
        if (!row) return null;
        return { value: parseFloat(row.value), period: row.period };
      } catch (err) {
        console.error("EIA fetch failed for", duoareaCode, err);
        return null;
      }
    }

    // Shared "key not set yet" message so the page still feels alive before
    // the user pastes their EIA key in.
    const KEY_MISSING_MSG = "Add your EIA API key at the top of index.html to load prices.";
    const keyIsSet = () => EIA_API_KEY && EIA_API_KEY !== "PASTE_YOUR_KEY_HERE";

    // ----- STATE SHAPES -------------------------------------------------------

    // GeoJSON = states as polygons. We load a public file via the jsDelivr CDN
    // (mirrors GitHub with proper CORS headers, unlike raw.githubusercontent.com).
    fetch("https://cdn.jsdelivr.net/gh/PublicaMundi/MappingAPI@master/data/geojson/us-states.json")
      .then((r) => r.json())
      .then((data) => {
        statesLayer = L.geoJSON(data, {
          style: stateStyleFor(currentTheme()),
          onEachFeature: (feature, layer) => {
            const stateName = feature.properties.name;
            const override = LABEL_OVERRIDES[stateName];
            if (override) {
              // Hand-picked position for split states (VA, MI). Standalone
              // tooltip with explicit latlng — not bound to the polygon.
              L.tooltip({
                permanent: true,
                direction: "center",
                className: "state-label",
              })
                .setLatLng(override)
                .setContent(stateName)
                .addTo(map);
            } else {
              // Normal case: let Leaflet auto-center the label on the polygon.
              // bindTooltip defers the centering math until after the layer is
              // on the map, so it works here even though the layer isn't on the
              // map yet at this moment in the iteration.
              layer.bindTooltip(stateName, {
                permanent: true,
                direction: "center",
                className: "state-label",
              });
            }

            // Subtle hover: brighten the blue fill while the cursor's over the state.
            layer.on("mouseover", () => layer.setStyle({ fillOpacity: 0.5 }));
            layer.on("mouseout",  () => layer.setStyle({ fillOpacity: 0.2 }));

            layer.on("click", async () => {
              const stateName = feature.properties.name;
              const stateCode = STATE_NAME_TO_CODE[stateName];

              // If EIA publishes the state directly, use that. Otherwise fall
              // back to the state's PADD regional average.
              const stateSeries = STATE_EIA_CODES[stateCode];
              const eiaCode = stateSeries || STATE_TO_PADD[stateCode];
              const isFallback = !stateSeries;

              const popup = L.popup()
                .setLatLng(layer.getBounds().getCenter())
                .setContent(`<strong>${stateName}</strong><br>Loading…`)
                .openOn(map);

              if (!keyIsSet()) {
                popup.setContent(`<strong>${stateName}</strong><br>${KEY_MISSING_MSG}`);
                return;
              }
              if (!eiaCode) {
                popup.setContent(`<strong>${stateName}</strong><br>No EIA region mapped.`);
                return;
              }

              const price = await fetchPrice(eiaCode);
              if (!price) {
                popup.setContent(`<strong>${stateName}</strong><br>No data available.`);
                return;
              }

              const sourceLabel = isFallback
                ? `${PADD_NAMES[eiaCode]} regional average`
                : "State average";
              registerPriceRender(popup, () => {
                popup.setContent(
                  `<strong>${stateName}</strong><br>` +
                  `${formatPrice(price.value, "USD", "gallon")}<br>` +
                  `<small>${sourceLabel} · Week of ${price.period}</small>`
                );
              });
            });
          },
        }).addTo(map);
      })
      .catch((err) => console.error("Failed to load state shapes", err));

    // ----- CITY PINS ----------------------------------------------------------

    CITY_PINS.forEach((city) => {
      const marker = L.marker([city.lat, city.lng]).addTo(map);
      // Initial popup text — Leaflet shows this immediately on click, then our
      // handler swaps in the real price once the fetch resolves.
      marker.bindPopup(`<strong>${city.name}</strong><br>Loading…`);

      marker.on("click", async () => {
        if (!keyIsSet()) {
          marker.setPopupContent(`<strong>${city.name}</strong><br>${KEY_MISSING_MSG}`);
          return;
        }
        marker.setPopupContent(`<strong>${city.name}</strong><br>Loading…`);
        const price = await fetchPrice(city.code);
        if (!price) {
          marker.setPopupContent(`<strong>${city.name}</strong><br>No data available.`);
          return;
        }
        registerPriceRender(marker.getPopup(), () => {
          marker.setPopupContent(
            `<strong>${city.name}</strong><br>` +
            `${formatPrice(price.value, "USD", "gallon")}<br>` +
            `<small>City average · Week of ${price.period}</small>`
          );
        });
      });
    });

    // ----- EU COUNTRIES (Slice 2) ---------------------------------------------
    //
    // Two files, both shipped with the repo (no API key, no server):
    //   data/eu-countries.geojson — country polygons (one per EU member)
    //   data/eu-prices.json       — latest weekly prices, refreshed by
    //                                scripts/fetch_eu_prices.py
    //
    // We start fetching the prices JSON immediately so it's likely already
    // resolved by the time a user clicks a country. The geojson fetch builds
    // the visible layer; the click handler `await`s the prices Promise.

    const euPricesPromise = fetch("data/eu-prices.json")
      .then((r) => r.json())
      .catch((err) => {
        console.error("EU prices load failed", err);
        return null;
      });

    fetch("data/eu-countries.geojson")
      .then((r) => r.json())
      .then((data) => {
        euCountriesLayer = L.geoJSON(data, {
          style: euStyleFor(),
          onEachFeature: (feature, layer) => {
            const { name } = feature.properties;

            // Country name as a permanent label, like US states. Tiny
            // countries (Malta, Luxembourg) will get crowded labels at low
            // zoom — that's fine, they expand as you zoom in.
            const override = EU_LABEL_OVERRIDES[name];
            if (override) {
              // Same pattern as the US split-state overrides: a standalone
              // tooltip at an explicit latlng instead of one bound to the
              // polygon (binding would re-trigger Leaflet's off-center math).
              L.tooltip({
                permanent: true,
                direction: "center",
                className: "country-label",
              })
                .setLatLng(override)
                .setContent(name)
                .addTo(map);
            } else {
              layer.bindTooltip(name, {
                permanent: true,
                direction: "center",
                className: "country-label",
              });
            }

            layer.on("mouseover", () => layer.setStyle({ fillOpacity: 0.5 }));
            layer.on("mouseout",  () => layer.setStyle({ fillOpacity: 0.2 }));

            layer.on("click", async () => {
              const { iso2 } = feature.properties;
              const popup = L.popup()
                .setLatLng(layer.getBounds().getCenter())
                .setContent(`<strong>${name}</strong><br>Loading…`)
                .openOn(map);

              const prices = await euPricesPromise;
              if (!prices) {
                popup.setContent(`<strong>${name}</strong><br>Price data failed to load.`);
                return;
              }
              const entry = prices.countries[iso2];
              if (!entry || entry.gasoline_eur_per_l == null) {
                popup.setContent(`<strong>${name}</strong><br>No data available.`);
                return;
              }
              // 3 decimals because European pump signs typically show
              // €/L to the tenth-of-a-cent (e.g. 1.829 €/L).
              registerPriceRender(popup, () => {
                popup.setContent(
                  `<strong>${name}</strong><br>` +
                  `${formatPrice(entry.gasoline_eur_per_l, "EUR", "litre")} (Euro-super 95)<br>` +
                  `<small>EU Weekly Oil Bulletin · Week of ${prices.week_of}</small>`
                );
              });
            });
          },
        }).addTo(map);
      })
      .catch((err) => console.error("Failed to load EU country shapes", err));

    // ----- WORLD COUNTRIES (Slice 3) --------------------------------------
    //
    // Rest of the world, sourced from globalpetrolprices.com via the python
    // script in scripts/fetch_world_prices.py. Same pattern as the EU layer:
    // two files shipped with the repo, no API key, no server.
    //
    //   data/world-countries.geojson — polygons for ~150 countries (US and
    //                                   EU members are filtered out so the
    //                                   world layer doesn't overlap the
    //                                   state / EU layers)
    //   data/world-prices.json       — { iso2: { name, gasoline_usd_per_l } }
    //                                   for ~170 countries
    //
    // Country labels are deliberately omitted here — at world-view zoom
    // there are too many polygons for permanent labels to be legible; the
    // green fill is signal enough that the shape is clickable, and hover
    // brightens the country under the cursor.

    const worldPricesPromise = fetch("data/world-prices.json")
      .then((r) => r.json())
      .catch((err) => {
        console.error("world prices load failed", err);
        return null;
      });

    function worldStyleFor() {
      const css = getComputedStyle(document.body);
      return {
        color: css.getPropertyValue("--world-stroke").trim(),
        weight: 1,
        fillColor: css.getPropertyValue("--world-fill").trim(),
        fillOpacity: 0.2,
      };
    }

    fetch("data/world-countries.geojson")
      .then((r) => r.json())
      .then((data) => {
        worldCountriesLayer = L.geoJSON(data, {
          style: worldStyleFor(),
          onEachFeature: (feature, layer) => {
            const { name, iso2 } = feature.properties;

            layer.on("mouseover", () => layer.setStyle({ fillOpacity: 0.5 }));
            layer.on("mouseout",  () => layer.setStyle({ fillOpacity: 0.2 }));

            layer.on("click", async () => {
              const popup = L.popup()
                .setLatLng(layer.getBounds().getCenter())
                .setContent(`<strong>${name}</strong><br>Loading…`)
                .openOn(map);

              const prices = await worldPricesPromise;
              if (!prices) {
                popup.setContent(`<strong>${name}</strong><br>Price data failed to load.`);
                return;
              }
              const entry = prices.countries[iso2];
              if (!entry || entry.gasoline_usd_per_l == null) {
                popup.setContent(`<strong>${name}</strong><br>No data available.`);
                return;
              }
              // GPP refreshes weekly but doesn't expose the exact "week of"
              // — show the date we last ran the fetch script instead.
              const updated = prices.updated_at.slice(0, 10);
              registerPriceRender(popup, () => {
                popup.setContent(
                  `<strong>${name}</strong><br>` +
                  `${formatPrice(entry.gasoline_usd_per_l, "USD", "litre")}<br>` +
                  `<small>GlobalPetrolPrices.com · Updated ${updated}</small>`
                );
              });
            });
          },
        }).addTo(map);
      })
      .catch((err) => console.error("Failed to load world country shapes", err));
  </script>
</body>
</html>
